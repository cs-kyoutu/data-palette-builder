services:
  - type: web
    name: data-palette-builder
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: APP_AUTH_TOKEN
        sync: false
      - key: CORS_ORIGIN
        value: "https://data-palette-builder.onrender.com"
      - key: PERSIST_DIR
        value: "/data"
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: data-palette-data
      mountPath: /data
      sizeGB: 1

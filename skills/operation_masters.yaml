  template: |
    『絞り込み』
    「{対象カラム}」が"{条件値}"《{条件種別}》に絞り込む

絞込み_空文字:
  params: [対象カラム, 空文字条件]
  template: |
    『絞り込み』
    「{対象カラム}」が《{空文字条件}》に絞り込む

絞込み_真偽値:
  params: [対象カラム, 値]
  template: |
    『絞り込み』
    「{対象カラム}」が《{値}》に絞り込む

絞込み_NULL:
  params: [対象カラム, NULL条件]
  template: |
    『絞り込み』
    「{対象カラム}」が《{NULL条件}》に絞り込む

絞込み_数値:
  params: [対象カラム, 条件値, 条件種別]
  template: |
    『絞り込み』
    「{対象カラム}」が"{条件値}"《{条件種別}》に絞り込む

絞込み_範囲:
  params: [対象カラム, 開始値, 終了値, 条件種別]
  template: |

# b→dash操作マスタ: テンプレートテキスト + パラメータ定義
# Phase2テンプレートエンジンが参照する

連結:
  params: [連結対象1, 連結対象2, 区切り文字, 保存名, 表示方法]
  template_no_separator: |
    『連結』
    「{連結対象1}」と「{連結対象2}」を選択
    クレンジングタスクの保存名を"{保存名}"にする
    表示方法《{表示方法}》を選択
  template_with_separator: |
    『連結』
    「{連結対象1}」と「{連結対象2}」を選択
    [テキスト挿入]を押下し、カラムとカラムの間に"{区切り文字}"を挿入し、[適用]を押下する
    クレンジングタスクの保存名を"{保存名}"にする
    表示方法《{表示方法}》を選択

テキスト挿入:
  params: [対象カラム, 位置, 挿入テキスト, 保存方法, 保存名]
  template: |
    『テキスト挿入』
    「{対象カラム}」の《{位置}》に"{挿入テキスト}"を挿入
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

分割:
  params: [対象カラム, 区切り文字, 開始位置, 分割数]
  template: |
    『分割』
    「{対象カラム}」を[区切り文字]"{区切り文字}"で、[開始位置]《{開始位置}》から《{分割数}》列に分割する

四則演算_カラム:
  params: [左辺カラム, 演算子, 右辺カラム, 小数位, 端数処理, 保存名, 表示方法]
  template: |
    『四則演算』
    「{左辺カラム}」《{演算子}》「{右辺カラム}」、[端数処理]は小数第《{小数位}》位を、《{端数処理}》する
    クレンジングタスクの保存名を"{保存名}"にする
    表示方法《{表示方法}》を選択

四則演算_固定値:
  params: [左辺カラム, 演算子, 右辺値, 小数位, 端数処理, 保存名, 表示方法]
  template: |
    『四則演算』
    「{左辺カラム}」《{演算子}》"{右辺値}"、[端数処理]は小数第《{小数位}》位を、《{端数処理}》する
    クレンジングタスクの保存名を"{保存名}"にする
    表示方法《{表示方法}》を選択

時刻演算_本日:
  params: [本日種別, 演算子, 対象カラム, 単位, 保存名, 表示方法]
  template: |
    『時刻演算』
    《{本日種別}》《{演算子}》「{対象カラム}」　[計算結果]を《{単位}》で算出
    クレンジングタスクの保存名を"{保存名}"にする
    表示方法《{表示方法}》を選択

時刻演算_カラム同士:
  params: [左辺カラム, 演算子, 右辺カラム, 単位, 保存名, 表示方法]
  template: |
    『時刻演算』
    「{左辺カラム}」《{演算子}》「{右辺カラム}」、[計算結果]を《{単位}》で算出
    クレンジングタスクの保存名を"{保存名}"にする
    表示方法《{表示方法}》を選択

時刻演算_カスタム:
  params: [対象カラム, 演算子, カスタム値, 単位, 保存名, 表示方法]
  template: |
    『時刻演算』
    「{対象カラム}」《{演算子}》《カスタム："{カスタム値}"》　[計算結果]を《{単位}》で算出
    クレンジングタスクの保存名を"{保存名}"にする
    表示方法《{表示方法}》を選択

IF文_値:
  params: [対象カラム, 条件種別, 条件値, 真の値, 偽の値]
  template: |
    『IF文』
    「{対象カラム}」が"{条件値}"《{条件種別}》の場合、{真の値}に変換
    いずれの条件分岐にも該当しない場合、{偽の値}に変換

IF文_空文字:
  params: [対象カラム, 空文字条件, 真の値, 偽の値]
  template: |
    『IF文』
    「{対象カラム}」が《{空文字条件}》の場合、{真の値}に変換
    いずれの条件分岐にも該当しない場合、{偽の値}に変換

IF文_NULL:
  params: [対象カラム, NULL条件, 真の値, 偽の値]
  template: |
    『IF文』
    「{対象カラム}」が《{NULL条件}》の場合、{真の値}に変換
    いずれの条件分岐にも該当しない場合、{偽の値}に変換

IF文_カラム比較:
  params: [対象カラム, 比較カラム, 条件種別, 真の値, 偽の値]
  template: |
    『IF文』
    「{対象カラム}」が「{比較カラム}」《{条件種別}》の場合、{真の値}に変換
    いずれの条件分岐にも該当しない場合、{偽の値}に変換

IF文_絶対期間:
  params: [対象カラム, 開始日, 終了日, 条件種別, 真の値, 偽の値, 日時含めない, カラム使用]
  template: |
    『IF文』
    《絶対期間》を選択
    「{対象カラム}」が[開始日]{開始日}と[終了日]{終了日}《{条件種別}》の場合、{真の値}に変換
    いずれの条件分岐にも該当しない場合、{偽の値}に変換
    [{日時含めない}]にチェックを{カラム使用}

IF文_相対期間:
  params: [対象カラム, 開始値, 開始単位, 開始方向, 終了値, 終了単位, 終了方向, 条件種別, 真の値, 偽の値, 日時含めない]
  template: |
    『IF文』
    《相対期間》を選択
    「{対象カラム}」が[開始日]《{開始値}》《{開始単位}》《{開始方向}》～[終了日]《{終了値}》《{終了単位}》《{終了方向}》《{条件種別}》の場合、{真の値}に変換
    いずれの条件分岐にも該当しない場合、{偽の値}に変換
    [{日時含めない}]にチェックを入れる/入れない

追加_値:
  params: [位置カラム, 追加位置, データ型, 値]
  template: |
    『追加』
    「{位置カラム}」の《{追加位置}》を選択
    《{データ型}》の"{値}"を追加

追加_処理日:
  params: [位置カラム, 追加位置, データ型]
  template: |
    『追加』
    「{位置カラム}」の《{追加位置}》を選択
    《{データ型}》を選択し、[加工処理実行日のカラムを追加する]にチェックを入れる

複製:
  params: [対象カラム]
  template: |
    『複製』
    「{対象カラム}」を複製

削除:
  params: [対象カラムリスト]
  template: |
    『削除』
    {対象カラムリスト}を削除する

ランキング_単純:
  params: [対象カラム, ソート順, 同率処理]
  template: |
    『ランキング』
    「{対象カラム}」を《{ソート順}》に《{同率処理}》で順位付けする

ランキング_グループ:
  params: [グループカラム, 対象カラム, ソート順, 同率処理]
  template: |
    『ランキング』
    「{グループカラム}」をグループ化する単位として、「{対象カラム}」を《{ソート順}》に《{同率処理}》で順位付けする

集約:
  params: [キーカラムリスト, 集計設定リスト]
  template: |
    『集約』
    {キーカラムリスト}を集約のキーとして、{集計設定リスト}で集約

置換_値:
  params: [対象カラム, 検索種別, 検索値, 置換値, 保存方法, 保存名]
  template: |
    『置換』
    「{対象カラム}」の《{検索種別}》"{検索値}"を"{置換値}"に置換
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

置換_NULL:
  params: [対象カラム, 置換値, 保存方法, 保存名]
  template: |
    『置換』
    「{対象カラム}」の《NULL》を"{置換値}"に置換
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

型変換_テキスト:
  params: [対象カラム, 保存方法, 保存名]
  template: |
    『型変換』
    「{対象カラム}」を《テキスト型》に変換
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

型変換_その他:
  params: [対象カラム, 変換先型, エラー処理, 保存方法, 保存名]
  template: |
    『型変換』
    「{対象カラム}」を《{変換先型}》に変換
    型変換エラーの処理は、《{エラー処理}》を選択
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

抽出_先頭末尾:
  params: [対象カラム, 方向, 文字数, 抽出型, 保存方法, 保存名]

    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

抽出_中間:
  params: [対象カラム, 開始文字, 終了文字, 抽出型, 保存方法, 保存名]
  template: |
    『抽出』
    「{対象カラム}」の《中間》の"{開始文字}"文字目〜"{終了文字}"文字目を《{抽出型}》で抽出
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

除外:
  params: [対象カラム, 除外位置, 除外文字列, 保存方法, 保存名]
  template: |
    『除外』
    「{対象カラム}」の《{除外位置}》"{除外文字列}"を除外
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

書式変換:
  params: [対象カラム, 変換先, 保存方法, 保存名]
  template: |
    『書式変換』
    「{対象カラム}」を選択、[オプション(歯車アイコン)]を押下し、《{変換先}》に変換
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

0埋め:
  params: [対象カラム, 桁数, 保存方法, 保存名]
  template: |
    『0埋め』
    「{対象カラム}」を0埋めして《{桁数}》桁にする
    《{保存方法}》にて保存
    クレンジングタスクの保存名を"{保存名}"にする

絞込み_値:

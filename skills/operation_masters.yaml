# b→dash操作マスタ: マスタ2（パラメータ定義）+ マスタ1（手順テンプレート）
# Phase2のAIはparams(対象1〜6)の値を出力し、テンプレートエンジンがtemplateに埋め込む
# シート2のB〜F列=テンプレート部分、G〜K列=パラメータ値

連結:
  params: [連結対象1, 連結対象2, 連結対象3, 連結対象4, 連結対象5, 連結対象6]
  param_labels: [連結対象1, 連結対象2, 連結対象3, 連結対象4, 連結対象5, 連結対象6]
  template: |
    ①：クレンジングにて、項目「{連結対象1}」を選択する
    ②：画面上部【連結】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{連結対象1}」と「{連結対象2}」を連結する

分割:
  params: [分割対象項目, 分割条件, 何項目に分けるか]
  param_labels: [分割対象項目, 分割条件, 何項目に分けるか]
  template: |
    ①：クレンジングにて、項目「{分割対象項目}」を選択する
    ②：画面上部【分割】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{分割対象項目}」を分割条件：{分割条件}で「{何項目に分けるか}」に分割する

四則演算:
  params: [演算対象_左側, 演算対象_右側, 四則演算種別, 小数点, 端数処理]
  param_labels: [演算対象(左側), 演算対象(右側), 四則演算どれを, 小数点, 切り上げ/切り捨て/四捨五入]
  template: |
    ①：クレンジングにて、項目「{演算対象_左側}」を選択する
    ②：画面上部【四則演算】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{演算対象_左側}」を「{演算対象_右側}」{四則演算種別}する
    ※端数処理は、「{小数点}」で{端数処理}とする

IF文:
  params: [対象項目, 条件, 格納値, その他の格納値]
  param_labels: [対象項目, 条件, 格納値, その他の格納値]
  template: |
    ①：クレンジングにて、項目「{対象項目}」を選択する
    ②：画面上部【IF文】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{対象項目}」が""{条件}""の場合、{格納値}を格納する
    上記以外の場合、{その他の格納値}

追加:
  params: [格納値, データ型]
  param_labels: [格納値, データ型]
  template: |
    ①：クレンジングにて、項目を選択する
    ②：画面上部【追加】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{格納値}」を『{データ型}』で追加する

複製:
  params: [複製対象項目]
  param_labels: [複製対象項目]
  template: |
    ①：クレンジングにて、項目「{複製対象項目}」を選択する
    ②：画面上部【複製】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{複製対象項目}」を複製する

削除:
  params: [削除対象項目]
  param_labels: [削除対象項目]
  template: |
    ①：クレンジングにて、項目「{削除対象項目}」を選択する
    ②：画面上部【削除】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{削除対象項目}」を削除する

ランキング:
  params: [まとめる単位, ランキング順, 昇順降順, 行番号同率]
  param_labels: [まとめる単位, ランキング順, 昇順/降順, 行番号/同率あり/同率なし]
  template: |
    ①：クレンジングにて、項目「{まとめる単位}」を選択する
    ②：画面上部【ランキング】ボタンをクリックする
    ③：下記の通り、選択を行う
    まとめる単位：「{まとめる単位}」
    ランキング順：「{ランキング順}」が「{昇順降順}」
    新規項目に入力する値：「{行番号同率}」

参照:
  params: [まとめる単位, 参照する項目, 参照する順, 昇順降順, 入力する値]
  param_labels: [まとめる単位, 参照する項目, 参照する順, 昇順/降順, 入力する値]
  template: |
    ①：クレンジングにて、項目「{まとめる単位}」を選択する
    ②：画面上部【参照】ボタンをクリックする
    ③：下記の通り、選択を行う
    まとめる単位：「{まとめる単位}」
    参照する項目：「{参照する項目}」
    参照順：「{参照する順}」を「{昇順降順}」
    新規項目に入力する値：「{入力する値}」

集約:
  params: [まとめる単位, 集約対象項目, 集計方法]
  param_labels: [まとめる単位, 集約対象項目, 回数/最大値/最小値/合計値]
  template: |
    ①：クレンジングにて、項目「{まとめる単位}」を選択する
    ②：画面上部【集約】ボタンをクリックする
    ③：下記の通り、選択を行う
    まとめる単位：「{まとめる単位}」
    集約対象項目：「{集約対象項目}」を《{集計方法}》で集約

置換:
  params: [置換対象項目, 検索種別, 置換前, 置換後]
  param_labels: [置換対象項目, 文字列/正規表現, 置換前, 置換後]
  template: |
    ①：クレンジングにて、項目「{置換対象項目}」を選択する
    ②：画面上部【置換】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{置換対象項目}」の《{検索種別}》"{置換前}"を"{置換後}"に置換

型変換:
  params: [変換対象項目, 変換後の型, フォーマット]
  param_labels: [変換対象項目, 変換後の型, フォーマット]
  template: |
    ①：クレンジングにて、項目「{変換対象項目}」を選択する
    ②：画面上部【型変換】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{変換対象項目}」を《{変換後の型}》に変換

抽出:
  params: [抽出対象項目, 抽出方法, 文字数]
  param_labels: [抽出対象項目, 先頭/中間/後方, ○文字]
  template: |
    ①：クレンジングにて、項目「{抽出対象項目}」を選択する
    ②：画面上部【抽出】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{抽出対象項目}」の《{抽出方法}》から{文字数}文字を抽出

除外:
  params: [除外対象項目, 除外方法, 除外文字列]
  param_labels: [除外対象項目, すべて/先頭/後方, 除外文字列]
  template: |
    ①：クレンジングにて、項目「{除外対象項目}」を選択する
    ②：画面上部【除外】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{除外対象項目}」の《{除外方法}》"{除外文字列}"を除外

書式変換:
  params: [変換対象項目, 変換前, 変換後]
  param_labels: [変換対象項目, 変換前, 変換後]
  template: |
    ①：クレンジングにて、項目「{変換対象項目}」を選択する
    ②：画面上部【書式変換】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{変換対象項目}」を{変換前}から{変換後}に変換

名寄せ:
  params: [名寄せキー, 判定項目, 判定順]
  param_labels: [名寄せキー, 判定項目, 判定順]
  template: |
    ①：クレンジングにて、項目「{名寄せキー}」を選択する
    ②：画面上部【名寄せ】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{名寄せキー}」を名寄せするキーとして、「{判定項目}」を《{判定順}》に名寄せする

絞込み:
  params: [絞込み項目, 絞込み条件]
  param_labels: [絞り込み項目, 絞り込み条件]
  template: |
    ①：クレンジングにて、項目「{絞込み項目}」を選択する
    ②：画面上部【絞込み】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{絞込み項目}」が{絞込み条件}に絞り込む

時刻演算:
  params: [引かれる値, 引く値, 算出単位]
  param_labels: [引かれる値, 引く値, 算出単位]
  template: |
    ①：クレンジングにて、項目「{引かれる値}」を選択する
    ②：画面上部【時刻演算】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{引かれる値}」《-》「{引く値}」　[計算結果]を《{算出単位}》で算出

テキスト挿入:
  params: [対象カラム, 位置, 挿入テキスト]
  param_labels: [対象カラム, 文頭/文末, 挿入テキスト]
  template: |
    ①：クレンジングにて、項目「{対象カラム}」を選択する
    ②：画面上部【テキスト挿入】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{対象カラム}」の《{位置}》に"{挿入テキスト}"を挿入

0埋め:
  params: [対象カラム, 桁数]
  param_labels: [対象カラム, 桁数]
  template: |
    ①：クレンジングにて、項目「{対象カラム}」を選択する
    ②：画面上部【0埋め】ボタンをクリックする
    ③：下記の通り、選択を行う
    「{対象カラム}」を0埋めして《{桁数}》桁にする

並び替え:
  params: [並び順]
  param_labels: [並び順]
  template: |
    並び替えたいカラムを以下の並び順にドラッグ&ドロップし[適用]をクリックする
    並び順：{並び順}

カラム名変更:
  params: [変更前, 変更後]
  param_labels: [変更前, 変更後]
  template: |
    「{変更前}」を"{変更後}"に変更する

横統合:
  params: [左ファイル, 右ファイル, 統合方法, 統合キー, 残すカラム]
  param_labels: [左ファイル, 右ファイル, 統合方法, 統合キー, 残すカラム]
  template: |
    【{左ファイル}】と【{右ファイル}】を「{統合キー}」を統合キーとして、《{統合方法}》
    残すカラムは、
    {残すカラム}

縦統合:
  params: [ファイルリスト, 重複設定]
  param_labels: [統合ファイル, 重複設定]
  template: |
    {ファイルリスト}を縦統合
    重複データの設定は[{重複設定}]を選択

テンプレート_縦横変換:
  params: [集約キー, 横並びカラム, 並び順カラム, 並び順, 件数]
  param_labels: [集約キー, 横並びカラム, 並び順カラム, 並び順, 件数]
  template: |
    「{集約キー}」を集約のキーとして選択し、[適用]を押下する
    [横並びにしたいカラム]に{横並びカラム}の順で選択し、[適用]を押下する
    [並び順カラム]に「{並び順カラム}」《{並び順}》を選択し、[適用]を押下する
    [横並びにしたいカラムの数]を、上位《{件数}》位まで横に並べるとし、[適用]を押下する

テンプレート_横縦変換:
  params: [縦持ちカラム, 残すカラム]
  param_labels: [縦持ちカラム, 残すカラム]
  template: |
    [縦持ちにしたいカラム]に{縦持ちカラム}を選択し、[適用]を押下する
    [縦持ちにしたいカラム以外に残したいカラム]に{残すカラム}を選択し、[適用]を押下する

テンプレート_年齢算出:
  params: [生年月日カラム]
  param_labels: [生年月日カラム]
  template: |
    「{生年月日カラム}」を選択し、[適用]を押下する

テンプレート_金額カンマ区切り:
  params: [金額カラム]
  param_labels: [金額カラム]
  template: |
    「{金額カラム}」が金額に該当するカラムに選択され、上書き保存されました

テンプレート_IDマッピング:
  params: [webログファイル, webアクセスログID, ビジターID, PV_Click日時, ページURL, 顧客ID]
  param_labels: [webログファイル, webアクセスログID, ビジターID, PV/Click日時, ページURL, 顧客ID]
  template: |
    webアクセスログに【{webログファイル}】を選択し、必要なカラムを次の通りに選択する
    webアクセスログID: 「{webアクセスログID}」
    ビジターID: 「{ビジターID}」
    PV/Click日時: 「{PV_Click日時}」
    ページURL: 「{ページURL}」
    顧客ID: 「{顧客ID}」

テンプレート_都道府県地域変換:
  params: [都道府県カラム]
  param_labels: [都道府県カラム]
  template: |
    [都道府県に該当するカラム]に「{都道府県カラム}」を選択し、[適用]を押下する

    「{対象カラム}」が"{開始値}"～"{終了値}"《{条件種別}》に絞り込む

絞込み_絶対期間:
  params: [対象カラム, 開始日, 終了日, 条件種別, 日時含めない]
  template: |
    『絞り込み』
    《絶対期間》を選択
    「{対象カラム}」が[開始日]"{開始日}"と[終了日]"{終了日}"《{条件種別}》に絞り込む
    [{日時含めない}]にチェックを入れる/入れない

絞込み_相対期間:
  params: [対象カラム, 開始値, 開始単位, 開始方向, 終了値, 終了単位, 終了方向, 条件種別, 日時含めない]
  template: |
    『絞り込み』
    《相対期間》を選択
    「{対象カラム}」が[開始日]《{開始値}》《{開始単位}》《{開始方向}》と[終了日]《{終了値}》《{終了単位}》《{終了方向}》《{条件種別}》に絞り込む
    [{日時含めない}]にチェックを入れる/入れない

絞込み_AND:
  params: [条件リスト]
  template: |
    『絞り込み』
    {条件リスト}

絞込み_OR:
  params: [条件リスト]
  template: |
    『絞り込み』
    {条件リスト}

名寄せ_日時:
  params: [キーカラム, 判定カラム, 判定順]
  template: |
    『名寄せ』
    「{キーカラム}」を名寄せするキーとして、「{判定カラム}」を《{判定順}》に名寄せする

名寄せ_値:
  params: [キーカラム, 判定カラム, 判定順]
  template: |
    『名寄せ』
    「{キーカラム}」を名寄せするキーとして、「{判定カラム}」を《{判定順}》に名寄せする

参照:
  params: [パターン, グループカラム, ソートカラム, ソート順, 値カラム, NULL処理, 保存名]
  template: |
    『参照』
    《{パターン}》を選択し、[適用]を押下する
    「{グループカラム}」でグループ化、「{ソートカラム}」の《{ソート順}》でソートを行い
    「{値カラム}」を参照する
    空文字/Nullの値を《{NULL処理}》を選択し[適用]を押下する
    クレンジングタスクの保存名を"{保存名}"にする

参照_特定順番:
  params: [グループカラム, ソートカラム, ソート順, 値カラム, 順番, NULL処理, 保存名]
  template: |
    『参照』
    《特定の順番の値》を選択し、[適用]を押下する
    「{グループカラム}」でグループ化、「{ソートカラム}」の《{ソート順}》でソートを行い
    「{値カラム}」の上から《{順番}》番目の値を参照する
    [空文字/Nullの値を無視する]にチェックを{NULL処理}
    クレンジングタスクの保存名を"{保存名}"にする

並び替え:
  params: [カラム順リスト]
  template: |
    『並び替え』
    並び替えたいカラムを以下の並び順にドラッグ&ドロップし[適用]をクリックする
    並び順：{カラム順リスト}

カラム名変更:
  params: [変更リスト]
  template: |
    『カラム名の変更』
    {変更リスト}

横統合:
  params: [左ファイル, 右ファイル, 統合方法, 統合キーリスト, 残すカラム左, 残すカラム右, 保存名, 重複処理, 更新設定]
  template: |
    『横統合』
    【{左ファイル}】と【{右ファイル}】を{統合キーリスト}を統合キーとして、《{統合方法}》
    残すカラムは、
    【{左ファイル}】：{残すカラム左}
    【{右ファイル}】：{残すカラム右}
    データファイルの保存名を"{保存名}"にする
    レコードが重複した際の処理方法は
    《{重複処理}》を選択し、[適用]を押下する
    統合データの更新設定は《{更新設定}》を選択し、[適用]を押下する

縦統合:
  params: [ファイルリスト, 重複除外, 保存名, 更新設定]
  template: |
    『縦統合』
    {ファイルリスト}を縦統合
    重複データの設定は
    [{重複除外}]を選択し、[適用]を押下する
    データファイルの保存名を"{保存名}"にする
    統合データの更新設定は《{更新設定}》を選択し、[適用]を押下する

テンプレート_縦横変換:
  params: [キーカラムリスト, 横並びカラムリスト, ソートカラム, ソート順, 上位N件]
  template: |
    『テンプレート
    『顧客ごとに縦持ちのデータを横に並べて変換』』
    {キーカラムリスト}を集約のキーとして選択し、[適用]を押下する
    [横並びにしたいカラム]に{横並びカラムリスト}の順で選択し、[適用]を押下する
    [並び順カラム]に「{ソートカラム}」《{ソート順}》を選択し、[適用]を押下する
    [横並びにしたいカラムの数]を、カラムの並び順で設定した順番をもとに、上位《{上位N件}》位まで横に並べるとし、[適用]を押下する

テンプレート_横縦変換:
  params: [縦持ちカラムリスト, 残すカラムリスト]
  template: |
    『テンプレート
    『顧客ごとに横持ちのデータを縦に並べて変換』』
    [縦持ちにしたいカラム]に{縦持ちカラムリスト}を選択し、[適用]を押下する
    [縦持ちにしたいカラム以外に残したいカラム]に{残すカラムリスト}を選択し、[適用]を押下する


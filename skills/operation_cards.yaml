  テンプレート_縦横変換:
    カテゴリ: テンプレート
    bdash_ui名: "顧客ごとに縦持ちのデータを横に並べて変換"
    一言説明: "縦持ちデータを横持ちに変換する（PIVOT）"
    SQL対応: "PIVOT / CASE WHEN + GROUP BY"
    入力:
      - "縦持ちテーブル（1キーに複数行）"
    出力: "横持ちテーブル（行数が減り列数が増える）"
    必須settings:
      集約キー: "横持ちの各行を識別するキーカラム（例: 顧客ID）"
      横並びカラム: "列に展開する値を持つカラム（例: 購買金額）"
      並び順カラム: "横展開の順序を決めるカラム（例: 購買日）"
      並び順: "昇順 / 降順"
      件数: "横展開する最大列数（上位N件）"
    任意settings: {}
    使う場面:
      - "顧客ごとの購買履歴（縦持ち）を1行に横展開してMLの特徴量として使用"
      - "メール配信ごとの開封・クリック（縦持ち）を顧客1行の特徴量に変換"
    使わない場面_よくある誤用:
      - "展開件数が多すぎるとカラム数が膨大になるためNは適切に制限する"
      - "縦持ちデータが1キー1行に整理されていない場合は事前に集約・名寄せを行う"
    類似操作との違い:
      テンプレート_横縦変換: "横縦変換は横持ち→縦持ち（UNPIVOT）。縦横変換はその逆（PIVOT）"
      集約: "集約はSUM/COUNT等の集計値を1行に圧縮。縦横変換は値を横の列に展開"
    最小実行例:
      集約キー: "顧客ID"
      横並びカラム: "購買金額"
      並び順カラム: "購買日"
      並び順: "降順"
      件数: "3"
      説明: "顧客ごとの最新3回の購買金額を横展開して特徴量を作成"

  テンプレート_横縦変換:
    カテゴリ: テンプレート
    bdash_ui名: "顧客ごとに横持ちのデータを縦に並べて変換"

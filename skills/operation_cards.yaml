# b→dash Data Palette 操作カード v1.0
# 生成日: 2026-05-21
# 対象: 統合×2, 加工×22, テンプレート×6

operations:

  # ============================================================
  # 統合系
  # ============================================================

  横統合:
    カテゴリ: 統合
    一言説明: "2テーブルをキー項目で横方向に結合し列を追加する（JOIN）"
    SQL対応: "LEFT JOIN / INNER JOIN / RIGHT JOIN / FULL OUTER JOIN"
    入力:
      - "左ファイル（ベーステーブル）"
      - "右ファイル（結合テーブル）"
    出力: "結合後テーブル（統合方法により行数が変わる）"
    必須settings:
      左ファイル: "ベースとなるテーブル"
      右ファイル: "結合するテーブル（マスタ等）"
      統合方法: "左 / 右 / 内部 / 完全外部"
      統合キー: "結合に使うカラム（左右で同名または別名指定可）"
    任意settings:
      残すカラム: "右テーブルから取り込むカラムを限定指定（省略時は全列）"
    使う場面:
      - "顧客マスタから性別・年代・セグメントを購買ログに付与"
      - "商品マスタで商品名・価格を補完"
      - "コンバージョンデータにWebログのビジターIDを紐付け"
    使わない場面_よくある誤用:
      - "同じ構造の月次データを1本化したい → 縦統合を使う"
      - "右テーブルの統合キーに重複がある場合は行が増殖するため、事前に名寄せ・絞込みで一意化する"
      - "内部結合は左テーブルのキー非一致行が消えることに注意"
    類似操作との違い:
      縦統合: "縦統合は行を追加（UNION）。横統合は列を追加（JOIN）"
    最小実行例:
      左ファイル: "購買データ"
      右ファイル: "顧客マスタ"
      統合方法: "左"
      統合キー: "顧客ID"
      残すカラム: "性別, 年代"
      説明: "購買データ全行を保持しつつ顧客マスタの性別・年代を付与"

  縦統合:
    カテゴリ: 統合
    一言説明: "複数テーブルを縦方向に積み上げて1テーブルにまとめる（UNION）"
    SQL対応: "UNION ALL / UNION DISTINCT"
    入力:
      - "統合対象テーブル（2つ以上、同一カラム構成が前提）"
    出力: "縦に結合された1テーブル"
    必須settings:
      統合ファイル: "縦に結合するテーブルのリスト（順番が行の並び順になる）"
      重複設定: "重複を残す（UNION ALL）/ 重複を除く（UNION DISTINCT）"
    任意settings: {}
    使う場面:
      - "1〜12月の月次ファイルを1ファイルに集約"
      - "A店・B店・C店の売上データを合算"
      - "複数広告媒体のクリックログを1テーブルに統合"
    使わない場面_よくある誤用:
      - "カラムが異なるテーブル同士を結合したい → 横統合を使う"
      - "カラム構成が異なる場合は事前に削除・追加でカラムを揃える"
    類似操作との違い:
      横統合: "横統合はキーで列を結合（JOIN）。縦統合は行を追加（UNION）"
    最小実行例:
      統合ファイル: "売上_4月, 売上_5月, 売上_6月"
      重複設定: "重複を残す"
      説明: "4〜6月の売上データを1ファイルに集約（同一行が複数あっても保持）"

  # ============================================================
  # 加工系
  # ============================================================

  連結:
    カテゴリ: 加工
    一言説明: "複数のカラムを1つのカラムに結合する（CONCAT）"
    SQL対応: "CONCAT(col1, col2, ...)。区切り文字ありは CONCAT('姓', '-', '名')。各カラムは IFNULL(col,'') で正規化（NULLは空文字扱い、結果はNULLにならない）"
    入力:
      - "連結対象カラム（2〜10列）"
    出力: "連結後の新規カラム"
    必須settings:
      連結対象1: "1番目に結合するカラム"
      連結対象2: "2番目に結合するカラム"
    任意settings:
      連結対象3〜10: "3〜10番目の連結カラム（最大10列。ソース確認済）"
      区切り文字: "カラム間に挿入する文字（連結ダイアログ内の[テキスト挿入]で指定。例: '-', スペース）"
    使う場面:
      - "姓と名を結合して「氏名」を作成"
      - "年・月・日カラムを結合して日付文字列を生成"
      - "商品コードと店舗コードを連結してユニークキーを生成"
    使わない場面_よくある誤用:
      - "区切り文字（スペース・ハイフン等）は連結ダイアログ内の[テキスト挿入]で直接指定できる（別途カラムを作る必要はない。ソース確認済）"
      - "数値型カラムは事前に型変換（文字列型）してから連結"
    類似操作との違い:
      テキスト挿入: "テキスト挿入は固定文字列を先頭・末尾に付与。連結はカラム同士を結合"
      追加: "追加は固定値の新規カラム作成。連結はカラムの値を組み合わせる"
    最小実行例:
      連結対象1: "姓"
      連結対象2: "名"
      説明: "「姓」と「名」を結合して「氏名」1カラムにする"

  テキスト挿入:
    カテゴリ: 加工
    一言説明: "カラムの先頭または末尾に固定文字列を付加する"
    SQL対応: "CONCAT('prefix', col) / CONCAT(col, 'suffix')"
    入力:
      - "対象カラム（1列）"
    出力: "テキスト付与後の新規カラム"
    必須settings:
      対象カラム: "テキストを挿入するカラム"
      位置: "文頭 / 文末"
      挿入テキスト: "挿入する固定文字列"
    任意settings: {}
    使う場面:
      - "金額カラムの末尾に「円」を付与して表示用文字列を作成"
      - "店舗コードに「SHOP-」プレフィックスを付与"
      - "URLパスの先頭に固定ドメインを付与"
    使わない場面_よくある誤用:
      - "動的な値（他カラムの値）を挿入したい → 連結を使う"
      - "先頭と末尾の両方に挿入したい場合は2回実行する"
    類似操作との違い:
      連結: "連結はカラム同士の組み合わせ。テキスト挿入は固定文字列のみ付与"
      追加: "追加は全行に同じ固定値の列を作成。テキスト挿入は既存値に固定文字列を付け加える"
    最小実行例:
      対象カラム: "金額"
      位置: "文末"
      挿入テキスト: "円"
      説明: "「金額」カラムの末尾に「円」を追加して表示用カラムを作成"

  分割:
    カテゴリ: 加工
    一言説明: "1つのカラムを区切り文字または位置で複数のカラムに分割する"
    SQL対応: "SPLIT_PART(col, delimiter, n) / SUBSTRING"
    入力:
      - "分割対象カラム（1列）"
    出力: "分割後の複数カラム"
    必須settings:
      分割対象項目: "分割するカラム"
      分割条件: "区切り文字（例: 「,」「-」「スペース」）または「先頭N文字」等"
      何項目に分けるか: "分割後のカラム数"
    任意settings: {}
    使う場面:
      - "「2024-01-15」を年・月・日の3カラムに分割"
      - "「東京都新宿区」を都道府県と市区町村に分割"
      - "CSV形式で格納されたタグ文字列を個別カラムに展開"
    使わない場面_よくある誤用:
      - "1つの部分文字列を取り出したいだけ → 抽出を使う"
      - "分割数より実際の区切り数が多い場合、余りは最後のカラムに格納されるため確認が必要"
    類似操作との違い:
      抽出: "抽出は先頭/末尾/中間の位置指定で1文字列を取り出す。分割は区切り文字で複数カラムに展開"
      除外: "除外は不要な文字を削除。分割は複数カラムに展開"
    最小実行例:
      分割対象項目: "生年月日"
      分割条件: "-"
      何項目に分けるか: "3"
      説明: "「2000-01-15」を「年」「月」「日」の3カラムに分割"

  四則演算:
    カテゴリ: 加工
    一言説明: "2つのカラムまたは値の間で加減乗除を行い新規カラムを作成する"
    SQL対応: "col1 + col2 / col1 - col2 / col1 * col2 / 除算は CASE WHEN 分母=0 THEN NULL ELSE col1/col2 END（ゼロ除算は自動でNULL保護）"
    入力:
      - "演算対象カラムまたは固定値（左側・右側）"
    出力: "演算結果の新規カラム"
    必須settings:
      演算対象_左側: "カラム名または固定数値"
      演算対象_右側: "カラム名または固定数値"
      四則演算種別: "加算(+) / 減算(-) / 乗算(×) / 除算(÷)"
    任意settings:
      小数点: "小数点以下の桁数"
      端数処理: "切り捨て / 切り上げ / 四捨五入"
    使う場面:
      - "単価×数量で売上金額を算出"
      - "税抜金額×1.1で税込金額を算出"
      - "目標達成率 = 実績 ÷ 目標 × 100 を算出"
      - "LTV ÷ 購買回数で平均購買単価を算出"
    使わない場面_よくある誤用:
      - "日付の加算・減算には時刻演算を使う"
      - "ゼロ除算は自動でNULLになるため、IF文での事前処理は不要（ソース確認済）"
      - "文字列型カラムは事前に型変換（数値型）してから演算"
    類似操作との違い:
      時刻演算: "時刻演算は日付・時刻専用の差分計算。四則演算は数値全般の加減乗除"
      集約: "集約はグループ単位で集計（行数減少）。四則演算は行レベルで2値を演算（行数不変）"
    最小実行例:
      演算対象_左側: "単価"
      演算対象_右側: "数量"
      四則演算種別: "乗算(×)"
      小数点: "0"
      端数処理: "切り捨て"
      説明: "単価×数量で「売上金額」カラムを新規作成"

  時刻演算:
    カテゴリ: 加工
    一言説明: "2つの日時の差分算出（DATEDIFF）、または日時への期間の加減算（TIMEADD）を行う"
    SQL対応: "差分=DATEDIFF(unit, start, end) / 加減算=TIMEADD(unit, ±N, 基準日時)。固定値「本日」は CONVERT_TIMEZONE('UTC','Asia/Tokyo', CURRENT_TIMESTAMP) 基準（ソース確認済）"
    入力:
      - "差分: 引かれる値（対象列）・引く値=第2項（列 / 特定の日付 / 本日の日付）"
      - "加減算: 基準日時（カラム）・加減算量（N単位、カスタム）"
    出力: "差分値（数値型）または加減算後の日時カラム"
    必須settings:
      演算種別: "差分 / 加算 / 減算"
      引かれる値: "【差分時】終了日時のカラム"
      引く値: "【差分時】開始日時のカラムまたは固定日時値"
      基準日時: "【加減算時】基準となる日時（カラム / 固定値 / 本日）"
      加減算量: "【加減算時】足し引きする量（正の整数、方向は演算種別で決定）"
      算出単位: "年 / 月 / 日 / 時間 / 分 / 秒"
    任意settings: {}
    使う場面:
      - "初回購買日から最終購買日の経過日数を算出してRFMのR値に使用"
      - "会員登録日からの経過月数でロイヤルティ段階を判定"
      - "配信日時からクリック日時までの反応時間（分）を算出"
      - "現在日時との差でアクティブ度スコアを算出"
      - "申込日に7日を足して「締切日」を算出（加算モード）／基準日からNヶ月後を算出"
    使わない場面_よくある誤用:
      - "単純な数値加減算には四則演算を使う"
      - "カラムの型が文字列の場合は型変換（日付型・日時型）してから使用"
      - "算出単位「月」は月の日数差により直感と異なる結果になる場合がある"
    類似操作との違い:
      四則演算: "四則演算は数値全般の演算。時刻演算は日付・時刻専用の差分計算"
      テンプレート_年齢算出: "年齢算出テンプレートは生年月日→年齢専用の特化版。時刻演算より設定が少ない"
    最小実行例:
      引かれる値: "最終購買日"
      引く値: "初回購買日"
      算出単位: "日"
      説明: "初回〜最終購買の経過日数を算出してリテンション分析に使用"

  IF文:
    カテゴリ: 加工
    一言説明: "条件に応じて異なる値を格納する新規カラムを作成する（CASE WHEN）"
    SQL対応: "CASE WHEN condition THEN value ELSE other_value END"
    入力:
      - "判定対象カラム"
    出力: "条件分岐後の値を持つ新規カラム"
    必須settings:
      対象項目: "条件判定に使うカラム"
      条件: "等しい / 含む / 以上 / 以下 / 空白 / 空白でない 等"
      格納値: "条件を満たした場合に格納する値"
      その他の格納値: "条件を満たさない場合に格納する値（ELSE句）"
    任意settings: {}
    使う場面:
      - "購買金額が10000円以上なら「優良」、未満なら「一般」フラグを付与"
      - "都道府県が「東京都」なら「首都圏」、それ以外なら「地方」に分類"
      - "メール開封フラグが1なら「開封あり」、0なら「開封なし」にラベル変換"
    使わない場面_よくある誤用:
      - "3値以上の分岐が必要な場合はIF文を複数回連続で適用する（ネスト構造は非対応）"
      - "数値比較の場合はカラムの型が数値型であることを確認"
    類似操作との違い:
      絞込み: "絞込みは条件を満たさない行を除去。IF文は行を保持しつつ条件で値を変える"
      置換: "置換は特定文字列パターンを別文字列に変換。IF文は論理条件で値を分岐する"
    最小実行例:
      対象項目: "購買金額"
      条件: "10000以上"
      格納値: "優良顧客"
      その他の格納値: "一般顧客"
      説明: "購買金額10000円以上を「優良顧客」、未満を「一般顧客」に分類"

  追加:
    カテゴリ: 加工
    一言説明: "全行に同じ固定値を持つ新規カラムを追加する"
    SQL対応: "SELECT *, '固定値' AS new_col"
    入力:
      - "なし（既存テーブルに固定値列を追加）"
    出力: "固定値カラムが追加されたテーブル"
    必須settings:
      格納値: "全行に入れる固定の値"
      データ型: "文字列 / 数値 / 日付 等"
    任意settings: {}
    使う場面:
      - "縦統合前にデータソースを識別する「媒体名」「店舗コード」カラムを付与"
      - "定数値（消費税率=0.1等）をカラムとして保持して四則演算に使用"
    使わない場面_よくある誤用:
      - "行によって値が異なる場合 → IF文・参照・集約で算出する"
      - "既存カラムのコピーが目的 → 複製を使う"
    類似操作との違い:
      複製: "複製は既存カラムの値をコピー。追加は全行に同じ固定値を入れる新規カラム"
      IF文: "IF文は条件で値が変わる。追加は全行固定値"
    最小実行例:
      格納値: "A店"
      データ型: "文字列"
      説明: "全行に「A店」という店舗識別カラムを追加（縦統合前の識別用）"

  複製:
    カテゴリ: 加工
    一言説明: "既存カラムをコピーして別名の新規カラムを作成する"
    SQL対応: "SELECT *, col AS col_copy"
    入力:
      - "複製対象カラム（1列）"
    出力: "元カラムと同じ値を持つ新規カラム"
    必須settings:
      複製対象項目: "コピーするカラム"
    任意settings: {}
    使う場面:
      - "型変換・加工前にバックアップカラムを作成"
      - "同じカラムを複数の後続処理（異なる条件のIF文等）に使い回す"
    使わない場面_よくある誤用:
      - "値を変えたコピーが目的 → IF文・置換・型変換を使う"
    類似操作との違い:
      追加: "追加は固定値の新規カラム。複製は既存カラムの値を引き継いだコピー"
    最小実行例:
      複製対象項目: "購買日"
      説明: "「購買日」を複製して変換前バックアップとして保持"

  削除:
    カテゴリ: 加工
    一言説明: "不要なカラムをテーブルから除去する"
    SQL対応: "SELECT col1, col2, ... （対象カラムを列挙から省略）"
    入力:
      - "削除対象カラム（1列）"
    出力: "指定カラムが除かれたテーブル"
    必須settings:
      削除対象項目: "削除するカラム"
    任意settings: {}
    使う場面:
      - "中間処理で作成したバックアップカラムを最終出力前に除去"
      - "個人情報（メールアドレス・電話番号等）を分析データから除去"
      - "後続処理で不要なカラムを削除してデータを軽量化"
    使わない場面_よくある誤用:
      - "行を除去したい → 絞込みを使う"
      - "削除は非可逆操作。事前に複製でバックアップを作成してから実行"
    類似操作との違い:
      絞込み: "絞込みは条件を満たさない行を除去。削除はカラムを除去"
      除外: "除外はカラム内の特定文字列を削除。削除はカラム自体を除去"
    最小実行例:
      削除対象項目: "購買日_バックアップ"
      説明: "変換後に不要になったバックアップカラムを削除"

  ランキング:
    カテゴリ: 加工
    一言説明: "指定カラムの値でグループ内順位を付与する（RANK/DENSE_RANK/ROW_NUMBER）"
    SQL対応: "RANK() / DENSE_RANK() / ROW_NUMBER() OVER (PARTITION BY ... ORDER BY ...)"
    入力:
      - "グループ化カラム（まとめる単位）"
      - "順位付けカラム（ランキング順）"
    出力: "順位値を持つ新規カラムが追加されたテーブル（行数不変）"
    必須settings:
      まとめる単位: "ランキングをリセットするグループ単位（例: 顧客ID）"
      ランキング順: "順位付けの基準カラム（例: 購買金額）"
      昇順降順: "昇順 / 降順"
      行番号同率: |
        行番号（ROW_NUMBER: 全て別順位）
        同率あり（DENSE_RANK: 同率は同順位、次の順位を飛ばさない）
        同率なし（RANK: 同率は同順位、次の順位を飛ばす）
    任意settings: {}
    使う場面:
      - "顧客ごとに購買金額上位3件を取得（後続の絞込み「順位≦3」と組み合わせ）"
      - "最新N回の購買データを抽出するための「購買順位」付与（購買日降順）"
      - "各商品カテゴリ内での売上ランキングを付与"
    使わない場面_よくある誤用:
      - "ランキング付与後、目的のランクで絞込みを行うことを忘れずに（ランキング単体では行数は減らない）"
      - "全件ランキング（グループなし）したい場合はまとめる単位に定数カラム（追加で作成）を使う"
    類似操作との違い:
      集約: "集約はグループを1行に圧縮（行数減少）。ランキングはグループ内の各行に順位を付与（行数不変）"
      参照: "参照はグループ内の特定行の値を付与。ランキングは全行に順位数値を付与"
    最小実行例:
      まとめる単位: "顧客ID"
      ランキング順: "購買日"
      昇順降順: "降順"
      行番号同率: "行番号"
      説明: "顧客ごとに最新購買から1,2,3…と順位付与 → 「順位=1」に絞込めば最終購買1件を取得"

  集約:
    カテゴリ: 加工
    一言説明: "指定キーでグループ化し集計関数（COUNT/SUM/AVG等）でデータを1行に集約する"
    SQL対応: "SELECT key, AGG(col) FROM t GROUP BY key"
    入力:
      - "グループ化カラム（まとめる単位）"
      - "集計対象カラム"
    出力: "グループごとに1行に集約されたテーブル（行数が大幅に減る）"
    必須settings:
      まとめる単位: "GROUP BY に相当するカラム（複数指定可）"
      集約対象項目: "集計するカラム"
      集計方法: |
        COUNT（件数）/ UNIQUE_COUNT（ユニーク件数）
        SUM（合計）/ AVG（平均）/ MAX（最大値）/ MIN（最小値）
        最新（最新値）/ 最古（最古値）/ 行結合（LISTAGG: 値を区切り文字で連結。WITHIN GROUP で並び順指定可）
    任意settings: {}
    使う場面:
      - "顧客ごとの購買回数・購買金額合計・最終購買日を算出（RFM分析）"
      - "月別・商品別の売上合計を集計"
      - "ユニーク顧客数のカウント（UNIQUE_COUNT）"
      - "メール開封者の最初の開封日（最古）を取得"
    使わない場面_よくある誤用:
      - "行数を減らさずに集計値を付与したい → ランキングや参照を使う"
      - "集約後は集約キー以外の非集計カラムは消えるため、必要な属性は事前に横統合で付与しておく"
      - "行結合は文字列連結のため、後続で数値演算する場合は別の集計方法を使う"
    類似操作との違い:
      ランキング: "ランキングは順位を付与（行数不変）。集約はグループを1行に圧縮（行数減少）"
      参照: "参照はグループ内の特定行の値を全行に付与（行数不変）。集約は1行に圧縮"
    最小実行例:
      まとめる単位: "顧客ID"
      集約対象項目: "購買金額"
      集計方法: "SUM"
      説明: "顧客ごとの購買金額合計を算出（RFMのM値）"

  置換:
    カテゴリ: 加工
    一言説明: "カラム内の特定文字列または正規表現パターンを別の文字列に置き換える"
    SQL対応: "REPLACE(col, '置換前', '置換後') / REGEXP_REPLACE(col, pattern, replacement)"
    入力:
      - "置換対象カラム（1列）"
    出力: "置換後の値を持つカラム"
    必須settings:
      置換対象項目: "置換するカラム"
      検索種別: "文字列（部分一致）/ 正規表現"
      置換前: "置き換え前の文字列またはパターン"
      置換後: "置き換え後の文字列（空文字にすれば削除相当）"
    任意settings: {}
    使う場面:
      - "「株式会社」「（株）」「㈱」を空文字に統一して社名を正規化"
      - "電話番号のハイフン除去（「090-1234-5678」→「09012345678」）"
      - "「TRUE」「FALSE」を「1」「0」に変換"
    使わない場面_よくある誤用:
      - "カラム全体を条件で別の値にしたい → IF文を使う"
      - "先頭・末尾のスペースのみ除去したい → 除外（先頭/後方）を使う"
      - "先頭の0まとめて除去（0埋め解除）したい → 置換後の値に空文字を指定できないケースあり。型変換（テキスト→数値）で代替するのが確実"
    類似操作との違い:
      除外: "除外は先頭/末尾/全体の位置指定で文字を削除。置換はパターンマッチで任意箇所を変換"
      IF文: "IF文は条件分岐で値を変える。置換はパターンマッチで文字列を変換"
    注意_b→dash固有:
      - "置換後の値に空文字（削除）を指定したい場合、UIが空欄を受け付けないことがある"
      - "その場合は型変換（テキスト→数値）で先頭0除去を代替するか、special_notesに手動対応を記載する"
    最小実行例:
      置換対象項目: "会社名"
      検索種別: "文字列"
      置換前: "株式会社"
      置換後: "（空文字）"
      説明: "会社名から「株式会社」を除去して正規化"

  型変換:
    カテゴリ: 加工
    一言説明: "カラムのデータ型を変換する（文字列↔数値↔日付 等）"
    SQL対応: "TRY_CAST(col AS type) ベース。変換失敗時の挙動を「NULL / 元の値 / 指定値」から選択可能（ハードエラーで停止しない）。日付/日時は社内UDF BD_TRY_TO_DATE/BD_TRY_TO_TIMESTAMP で多フォーマット自動認識（ソース確認済）"
    入力:
      - "変換対象カラム（1列）"
    出力: "指定した型に変換されたカラム"
    必須settings:
      変換対象項目: "型変換するカラム"
      変換後の型: "文字列 / 整数 / 小数 / 日付 / 日時 / 時刻"
    任意settings:
      フォーマット: "日付型変換時のフォーマット（例: YYYY-MM-DD, YYYYMMDD, YYYY/MM/DD）"
    使う場面:
      - "「000000012345」のような0埋め文字列IDの先頭0を除去したい → テキスト→数値に変換すると先頭0が自動除去される（途中の0は保持される）"
      - "CSVから読み込んだ金額カラムが文字列型 → 数値型に変換して四則演算・集約を可能に"
      - "「20240115」の文字列を日付型に変換して時刻演算・絞込みを可能に"
      - "数値型の顧客IDを文字列型に変換して連結・置換を可能に"
    使わない場面_よくある誤用:
      - "変換できない値（例: 「abc」→整数型）は変換エラーになるため、事前に絞込みや置換でクリーニング"
      - "日付フォーマット不一致は変換エラーになるため、実データの形式を確認してから設定"
      - "変換は上書きのため、元の値を残したい場合は事前に複製でバックアップ"
    類似操作との違い:
      書式変換: "書式変換は全角↔半角・大文字↔小文字等の表記変換。型変換はデータ型そのものの変換"
      置換: "置換は文字列内の一部を変換。型変換はカラム全体の型を変換"
    最小実行例:
      変換対象項目: "購買金額"
      変換後の型: "整数"
      説明: "文字列型の「購買金額」を整数型に変換して四則演算・集約を可能にする"

  抽出:
    カテゴリ: 加工
    一言説明: "文字列カラムの先頭・末尾・中間から指定N文字を取り出す"
    SQL対応: "LEFT(col, n) / RIGHT(col, n) / SUBSTR(col, start, length)"
    入力:
      - "抽出対象カラム（1列）"
    出力: "抽出した文字列を持つ新規カラム"
    必須settings:
      抽出対象項目: "抽出するカラム"
      抽出方法: "先頭 / 末尾 / 中間"
      文字数: "抽出する文字数"
    任意settings: {}
    使う場面:
      - "「2024-01-15」の先頭4文字を抽出して「年」カラムを作成"
      - "郵便番号「123-4567」の先頭3文字で地域判定"
      - "商品コード「ABC-001-XYZ」の中間部分でカテゴリコードを取得"
    使わない場面_よくある誤用:
      - "区切り文字で複数カラムに分けたい → 分割を使う"
      - "中間抽出は開始位置と文字数の両方を正確に指定する必要がある"
      - "値によって位置が変わる場合は事前に分割や置換でフォーマットを統一"
    類似操作との違い:
      分割: "分割は区切り文字で複数カラムに展開。抽出は位置指定で1文字列を取り出す"
      除外: "除外は特定文字を削除。抽出は特定位置の文字を取り出す"
    最小実行例:
      抽出対象項目: "生年月日"
      抽出方法: "先頭"
      文字数: "4"
      説明: "「19901015」から先頭4文字「1990」を抽出して「生年」カラムを作成"

  除外:
    カテゴリ: 加工
    一言説明: "文字列カラムの先頭・末尾または全体から指定した文字列を削除する"
    SQL対応: "TRIM(col) / REPLACE(col, char, '') / LTRIM / RTRIM"
    入力:
      - "除外対象カラム（1列）"
    出力: "指定文字を除去した後の文字列カラム"
    必須settings:
      除外対象項目: "除外するカラム"
      除外方法: "すべて（全体から除去）/ 先頭 / 後方（末尾）"
      除外文字列: "削除する文字列"
    任意settings: {}
    使う場面:
      - "先頭・末尾の余分なスペース・タブを除去（トリム処理）"
      - "「¥1,000」から「¥」と「,」を除去して数値型変換を可能に"
      - "末尾の「円」を除去して金額の数値変換を可能に"
    使わない場面_よくある誤用:
      - "先頭の0を桁数不定でまとめて除去したい（0埋め解除） → 除外は1回の実行で1文字しか削除できないため不向き。型変換（テキスト→数値）を使う"
      - "中間にある任意の文字列を置き換えたい → 置換を使う"
      - "カラム自体を削除したい → 削除を使う"
    類似操作との違い:
      置換: "置換はパターンマッチで任意箇所を変換。除外は先頭/末尾/全体の位置指定で文字を削除"
      削除: "削除はカラム自体を除去。除外はカラム内の文字列を除去"
    注意_b→dash固有:
      - "除外は指定文字列を1マッチずつ削除する。「000000012345」の先頭0を一括除去するには型変換（テキスト→数値）が正しい"
      - "固定の1文字または短い文字列の除去には有効。桁数が変動する連続文字の除去には使わない"
    最小実行例:
      除外対象項目: "金額"
      除外方法: "すべて"
      除外文字列: "円"
      説明: "「1000円」「2500円」から「円」を除去して数値型変換を可能にする"

  書式変換:
    カテゴリ: 加工
    一言説明: "全角↔半角・大文字↔小文字・ひらがな↔カタカナ等の文字表記を変換する"
    SQL対応: "UPPER(col) / LOWER(col) / （DB依存の正規化関数）"
    入力:
      - "変換対象カラム（1列）"
    出力: "表記変換後のカラム"
    必須settings:
      変換対象項目: "書式変換するカラム"
      変換前: "現在の書式（例: 全角, ひらがな, 大文字）"
      変換後: "変換後の書式（例: 半角, カタカナ, 小文字）"
    任意settings: {}
    使う場面:
      - "半角・全角が混在する電話番号・郵便番号を統一して名寄せ精度向上"
      - "大文字・小文字が混在するメールアドレスを小文字に統一してマッチング精度向上"
      - "ひらがな・カタカナが混在する氏名フリガナをカタカナに統一"
    使わない場面_よくある誤用:
      - "データ型を変換したい → 型変換を使う"
      - "特定の文字列を別の文字列に変換したい → 置換を使う"
    類似操作との違い:
      型変換: "型変換はデータ型を変える（文字列→数値等）。書式変換は同じ型のまま表記ルールを変える"
      置換: "置換は特定パターンを別の値に変換。書式変換は全角/半角など表記体系を一括変換"
    最小実行例:
      変換対象項目: "電話番号"
      変換前: "全角"
      変換後: "半角"
      説明: "全角数字の電話番号を半角に統一して名寄せ・絞込みの精度を上げる"

  名寄せ:
    カテゴリ: 加工
    一言説明: "同一エンティティの重複レコードを優先条件に基づき代表行1行に統合する"
    SQL対応: "ROW_NUMBER() OVER (PARTITION BY key ORDER BY priority_col) → WHERE rank=1"
    入力:
      - "名寄せキーカラム（同一エンティティを識別するカラム）"
      - "優先度判定カラム"
    出力: "重複を統合した1キー1行のテーブル（行数が減る）"
    必須settings:
      名寄せキー: "同一エンティティを識別するキーカラム（例: 顧客ID, メールアドレス）"
      判定項目: "どの値を代表値として残すかを決めるカラム（例: 更新日時, フラグ）"
      判定順: "優先する値の順序（例: 最新 / 最古 / 最大 / 最小）"
    任意settings: {}
    使う場面:
      - "同一顧客が複数チャネルで登録されている場合に最新情報を代表値として統合"
      - "購買データの重複行を最新レコードに統一"
      - "複数の紐付けIDを持つ顧客の代表レコードを1行に絞る"
    使わない場面_よくある誤用:
      - "単純に重複行を除去したいだけ → 縦統合の「重複を除く」設定を使う"
      - "名寄せ後は代表行の値が保持される（集計値ではない）"
      - "複数カラムを組み合わせたキーは事前に連結で1カラムにまとめると設定しやすい"
    類似操作との違い:
      集約: "集約はCOUNT/SUM等の集計関数を適用。名寄せは代表行を1行選ぶ（集計なし）"
      絞込み: "絞込みは条件で行を除去。名寄せはキー単位で重複を代表値に統合"
    最小実行例:
      名寄せキー: "顧客ID"
      判定項目: "更新日時"
      判定順: "最新"
      説明: "顧客IDが重複する行のうち、最新の更新日時のレコードを代表値として残す"

  絞込み:
    カテゴリ: 加工
    一言説明: "指定条件を満たす行のみを残して条件を満たさない行を除去する（WHERE）"
    SQL対応: "WHERE condition"
    入力:
      - "絞込み条件（カラム + 条件値）"
    出力: "条件を満たす行のみのテーブル（行数が減る）"
    必須settings:
      絞込み項目: "絞込みに使うカラム"
      絞込み条件: "等しい / 含む / 以上 / 以下 / 空白 / 空白でない / 期間 等"
    任意settings: {}
    使う場面:
      - "指定期間（例: 過去90日）の購買データのみを抽出"
      - "特定商品カテゴリのレコードに絞る"
      - "ランキングで付与した「順位=1」のみに絞って最終購買レコードを取得"
      - "空白値（未入力）のレコードを除去してデータ品質を確保"
    使わない場面_よくある誤用:
      - "値を書き換えたい（0→1等）→ IF文・置換を使う"
      - "カラムを除去したい → 削除を使う"
      - "日付の期間絞込みはカラムの型が日付型であることを確認（文字列型のままでは正確な比較が不可）"
    類似操作との違い:
      IF文: "IF文は行を保持しつつ条件で値を変える。絞込みは条件を満たさない行を除去"
      削除: "削除はカラムを除去。絞込みは行を除去"
      名寄せ: "名寄せはキー単位で重複を代表値に統合。絞込みは条件による行フィルタ"
    最小実行例:
      絞込み項目: "購買日"
      絞込み条件: "過去90日以内"
      説明: "直近90日以内の購買データのみに絞り込んでRFM分析対象を決定"

  参照:
    カテゴリ: 加工
    一言説明: "グループ内で指定条件（最初/最後/N番目/前後行/累計）の値を全行に付与する（ウィンドウ関数）"
    SQL対応: "FIRST_VALUE / LAST_VALUE / NTH_VALUE（N番目）/ LAG（前の行）/ LEAD（後ろの行） OVER (PARTITION BY key ORDER BY order_col)。IGNORE NULLS（NULL無視）指定可（ソース確認済）"
    入力:
      - "グループ化カラム（まとめる単位）"
      - "参照するカラム・参照順カラム"
    出力: "グループ内の代表値が全行に付与されたテーブル（行数不変）"
    必須settings:
      まとめる単位: "グループ単位のカラム（例: 顧客ID）"
      参照する項目: "値を取り出すカラム（例: 購買金額）"
      参照する順: "どの行の値を取るかの基準カラム（例: 購買日）"
      昇順降順: "昇順（最古を参照）/ 降順（最新を参照）"
      入力する値: "新規カラムに格納する値の指定"
    任意settings: {}
    使う場面:
      - "顧客ごとの初回購買金額を全購買行に付与（初回LTVとの比較）"
      - "セッション内の最初のページURLを全行に付与（入口ページ分析）"
    使わない場面_よくある誤用:
      - "グループを1行に集約したい → 集約を使う"
      - "参照順カラムに一意性がない場合、取得される値が不定になる"
    類似操作との違い:
      集約: "集約はグループを1行に圧縮（行数減少）。参照は全行保持のまま代表値を付与（行数不変）"
      ランキング: "ランキングは順位数値を付与。参照は指定条件の値そのものを付与"
    最小実行例:
      まとめる単位: "顧客ID"
      参照する項目: "購買金額"
      参照する順: "購買日"
      昇順降順: "昇順"
      入力する値: "初回購買金額"
      説明: "顧客ごとの初回購買（購買日昇順1番目）の金額を全行に付与"

  並び替え:
    カテゴリ: 加工
    一言説明: "テーブルのカラム順序を変更する"
    SQL対応: "SELECT col1, col2, col3, ... （カラムを希望順に列挙）"
    入力:
      - "並び替え後のカラム順序（ドラッグ&ドロップで指定）"
    出力: "カラム順が変更されたテーブル（値は変わらない）"
    必須settings:
      並び順: "並び替え後のカラム名リスト"
    任意settings: {}
    使う場面:
      - "Excelテンプレートの列順に合わせてカラムを並べ替える"
      - "最終出力前に出力定義書の仕様に合わせてカラム順を整える"
    使わない場面_よくある誤用:
      - "行の並び順を変えたい場合は別途ORDER BY相当の処理が必要（b→dashの並び替えはカラム順変更）"
    類似操作との違い:
      削除: "削除はカラムを除去。並び替えはカラム順を変えるだけ（値は変わらない）"
    最小実行例:
      並び順: "顧客ID, 氏名, 購買日, 購買金額, 商品コード"
      説明: "出力定義書に合わせてカラム順を整える"


    任意settings: {}
    使う場面:
      - "1行に複数商品カラムがある横持ち購買データを縦持ちに変換してカウント・集約を行う"
      - "アンケートの複数回答が横に並んでいるデータを縦持ちに変換して集計"
    使わない場面_よくある誤用:

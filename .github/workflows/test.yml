name: Procedure engine tests

# 検証専用。master へは push せず、feature ブランチ or 手動実行でのみ走る。
# ローカルに python/docker が無いため、Linux ランナーの python3 で
# backend/procedure_engine.py を node参照実装(golden)と突き合わせる。
on:
  workflow_dispatch: {}
  push:
    branches-ignore: [master]

jobs:
  procedure-engine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run procedure engine golden tests
        run: python tests/test_procedure.py

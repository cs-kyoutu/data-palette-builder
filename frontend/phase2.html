<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手順書ジェネレーター（Phase2）</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0CAAEB;
      --primary-dark: #0B4C6F;
      --primary-light: #36C1FA;
      --primary-bg: #F0F9FF;
      --bg: #f7f9fb;
      --surface: #ffffff;
      --text: #5B5B5F;
      --text-muted: #AEAEB2;
      --border: #e5eaf0;
      --accent-green: #0A8F3C;
      --accent-orange: #D48806;
    }
    body {
      font-family: "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.75;
    }

    /* Header */
    .header {
      background: var(--primary-light);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(11,76,111,0.10);
      z-index: 10;
    }
    .header h1 { font-size: 16px; font-weight: 700; }

    /* Back link */
    .back-link {
      color: white;
      text-decoration: none;
      font-size: 13px;
      opacity: 0.85;
      margin-left: auto;
      transition: opacity 0.15s;
    }
    .back-link:hover { opacity: 1; }

    /* Main Layout */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .panel-header h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
      background: var(--bg);
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .drop-zone p { font-size: 13px; color: var(--text-muted); }
    .drop-zone .icon { font-size: 28px; margin-bottom: 6px; }
    .drop-zone input { display: none; }

    /* File list */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--primary-bg);
      border-radius: 6px;
      font-size: 12px;
    }
    .file-item .name { color: var(--primary); font-weight: 500; }
    .file-item .remove {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
    }
    .file-item .remove:hover { color: #E53E3E; }

    /* Preview */
    .preview-section {
      border-top: 1px solid var(--border);
      padding-top: 16px;
      margin-top: 8px;
    }
    .preview-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-dark);
      text-align: center;
      margin-bottom: 12px;
    }
    .preview-item {
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      display: flex;
      gap: 8px;
    }
    .preview-item:last-child { border-bottom: none; }
    .preview-label {
      font-weight: 700;
      color: var(--primary-dark);
      min-width: 80px;
      flex-shrink: 0;
    }
    .preview-value {
      color: var(--text);
    }
    .preview-badge {
      display: inline-block;
      padding: 2px 10px;
      background: var(--primary-bg);
      color: var(--primary);
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      margin-right: 6px;
      margin-bottom: 4px;
    }
    .preview-order-list {
      list-style: none;
      padding: 0;
    }
    .preview-order-list li {
      padding: 4px 0;
      font-size: 12px;
      color: var(--text);
    }
    .preview-order-list li::before {
      content: attr(data-num) ". ";
      font-weight: 700;
      color: var(--primary);
    }

    /* Generate button */
    .generate-area {
      text-align: center;
      margin-bottom: 16px;
    }
    .generate-btn {
      padding: 14px 48px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .generate-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(12,170,235,0.25); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* AI result area */
    .ai-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 16px;
    }
    .ai-area-header {
      background: var(--bg);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-dark);
      border-bottom: 1px solid var(--border);
    }
    .ai-messages {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ai-msg {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ai-msg .avatar {
      font-size: 10px; font-weight: 700; flex-shrink: 0;
      display: flex; align-items: flex-start; justify-content: center;
    }
    .ai-msg.ai .avatar {
      width: 40px; height: 40px;
      background: none; border: none; padding: 0;
    }
    .ai-msg.ai .avatar img { width: 40px; height: 40px; object-fit: contain; display: block; }
    .ai-msg .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      max-width: 90%;
    }
    .ai-msg.ai .bubble { background: var(--bg); border: 1px solid var(--border); }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; padding: 6px 0; }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
      opacity: 0.6;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-7px); }
    }

    /* Download */
    .download-area {
      text-align: center;
      margin-bottom: 16px;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: var(--accent-green);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    .download-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <span style="font-size:20px">&#128196;</span>
  <h1>手順書ジェネレーター（Phase2）</h1>
  <a href="phase1.html" class="back-link">&larr; Phase1に戻る</a>
</div>

<div class="main-content">
  <div class="container">

    <!-- 設計書アップロード -->
    <div class="panel">
      <div class="panel-header">
        <h2>設計書JSONをアップロード</h2>
      </div>
      <div class="drop-zone" id="designDropZone" onclick="document.getElementById('designFileInput').click()">
        <div class="icon">&#128203;</div>
        <p>設計書JSONファイルをドロップ<br>または クリックして選択（.json）</p>
        <input type="file" id="designFileInput" accept=".json">
      </div>
      <div class="file-list" id="designFileList"></div>

      <!-- 設計書プレビュー -->
      <div id="designPreview" class="preview-section hidden">
        <div class="preview-title">── 設計書プレビュー ──</div>
        <div id="previewContent"></div>
      </div>
    </div>

    <!-- 生成ボタン -->
    <div class="generate-area">
      <button class="generate-btn" id="generateBtn" onclick="generate()" disabled>&#128640; 手順書を生成する</button>
    </div>

    <!-- AI生成エリア -->
    <div class="ai-area hidden" id="aiArea">
      <div class="ai-area-header" id="aiAreaHeader">AI 生成中...</div>
      <div class="ai-messages" id="aiMessages"></div>
    </div>

    <!-- ダウンロードボタン -->
    <div class="download-area hidden" id="downloadArea">
      <a class="download-btn" id="downloadBtn" href="#">&#128229; 手順書をダウンロード (.xlsx)</a>
    </div>

  </div>
</div>

<script>
  // --- State ---
  let designDoc = null;
  let sessionId = null;
  let isLoading = false;

  // --- Init ---
  function init() {
    setupDropZone();
  }

  function setupDropZone() {
    const zone = document.getElementById("designDropZone");
    const input = document.getElementById("designFileInput");

    zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("dragover"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
    zone.addEventListener("drop", e => {
      e.preventDefault();
      zone.classList.remove("dragover");
      handleDesignFile(e.dataTransfer.files);
    });
    input.addEventListener("change", e => handleDesignFile(e.target.files));
  }

  // --- File handling ---
  async function handleDesignFile(files) {
    const file = files[0];
    if (!file) return;

    try {
      const text = await file.text();
      designDoc = JSON.parse(text);

      // ファイル表示
      const list = document.getElementById("designFileList");
      list.innerHTML = "";
      const item = document.createElement("div");
      item.className = "file-item";
      item.innerHTML = `<span class="name">${file.name}</span><span class="remove" onclick="removeDesignFile(this)">&#10005;</span>`;
      list.appendChild(item);

      renderDesignPreview();
      document.getElementById("generateBtn").disabled = false;
    } catch (e) {
      console.error(e);
      alert("JSONファイルの読み込みに失敗しました。正しいJSON形式か確認してください。");
    }
  }

  function removeDesignFile(el) {
    designDoc = null;
    el.parentElement.remove();
    document.getElementById("designPreview").classList.add("hidden");
    document.getElementById("generateBtn").disabled = true;
  }

  // --- Preview ---
  function renderDesignPreview() {
    const preview = document.getElementById("designPreview");
    const content = document.getElementById("previewContent");

    if (!designDoc) {
      preview.classList.add("hidden");
      return;
    }

    let html = "";

    // 概要
    const summary = designDoc.summary || designDoc.description || designDoc.overview || "";
    if (summary) {
      html += `<div class="preview-item"><span class="preview-label">概要:</span><span class="preview-value">${escapeHtml(summary)}</span></div>`;
    }

    // テーブル一覧
    const tables = designDoc.tables || designDoc.input_tables || [];
    if (tables.length > 0) {
      const tableNames = tables.map(t => t.table_name || t.name || "不明").map(n => `<span class="preview-badge">${escapeHtml(n)}</span>`).join("");
      html += `<div class="preview-item"><span class="preview-label">テーブル:</span><span class="preview-value">${tableNames}</span></div>`;
    }

    // 結合
    const joins = designDoc.joins || designDoc.relations || [];
    if (joins.length > 0) {
      html += `<div class="preview-item"><span class="preview-label">結合:</span><span class="preview-value">${joins.length}件</span></div>`;
    }

    // 加工
    const transformations = designDoc.transformations || designDoc.processing || designDoc.derivations || [];
    if (transformations.length > 0) {
      html += `<div class="preview-item"><span class="preview-label">加工:</span><span class="preview-value">${transformations.length}件</span></div>`;
    }

    // 処理順序
    const steps = designDoc.processing_order || designDoc.steps || designDoc.procedure || [];
    if (steps.length > 0) {
      let stepsHtml = '<ul class="preview-order-list">';
      steps.forEach((step, i) => {
        const stepText = typeof step === "string" ? step : (step.description || step.name || step.label || JSON.stringify(step));
        stepsHtml += `<li data-num="${i + 1}">${escapeHtml(stepText)}</li>`;
      });
      stepsHtml += "</ul>";
      html += `<div class="preview-item"><span class="preview-label">処理順序:</span><span class="preview-value">${stepsHtml}</span></div>`;
    }

    // フォールバック: 何も表示できなかった場合
    if (!html) {
      const keys = Object.keys(designDoc);
      html += `<div class="preview-item"><span class="preview-label">キー:</span><span class="preview-value">${keys.map(k => `<span class="preview-badge">${escapeHtml(k)}</span>`).join("")}</span></div>`;
    }

    content.innerHTML = html;
    preview.classList.remove("hidden");
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  // --- Generate ---
  async function generate() {
    if (isLoading || !designDoc) return;
    isLoading = true;
    document.getElementById("generateBtn").disabled = true;

    // AI area表示
    const aiArea = document.getElementById("aiArea");
    aiArea.classList.remove("hidden");
    document.getElementById("aiAreaHeader").textContent = "AI 生成中...";
    document.getElementById("aiMessages").innerHTML = "";
    document.getElementById("downloadArea").classList.add("hidden");

    showTyping();

    try {
      // 設計書をアップロード
      const uploadFormData = new FormData();
      const blob = new Blob([JSON.stringify(designDoc)], { type: "application/json" });
      uploadFormData.append("file", blob, "design_document.json");

      const uploadRes = await fetch("/api/upload-design", {
        method: "POST",
        body: uploadFormData,
      });
      const uploadData = await uploadRes.json();
      sessionId = uploadData.session_id || sessionId;

      // 手順書を生成
      const genRes = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sessionId,
          design_document: designDoc,
        }),
      });
      const genData = await genRes.json();
      sessionId = genData.session_id || sessionId;

      removeTyping();
      document.getElementById("aiAreaHeader").textContent = "AI 生成結果";

      // 結果メッセージ
      showAiMessage(genData.reply || "手順書の生成が完了しました。");

      // ダウンロードボタン表示
      if (genData.download_url) {
        const downloadArea = document.getElementById("downloadArea");
        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.href = genData.download_url;
        downloadBtn.download = "";
        downloadArea.classList.remove("hidden");
      } else if (sessionId) {
        const downloadArea = document.getElementById("downloadArea");
        const downloadBtn = document.getElementById("downloadBtn");
        downloadBtn.href = `/api/download/${sessionId}`;
        downloadBtn.download = "";
        downloadArea.classList.remove("hidden");
      }
    } catch (e) {
      removeTyping();
      console.error(e);
      document.getElementById("aiAreaHeader").textContent = "エラー";
      showAiMessage("エラーが発生しました。もう一度お試しください。");
    }

    isLoading = false;
    document.getElementById("generateBtn").disabled = false;
  }

  // --- AI message helpers ---
  function showAiMessage(text) {
    const container = document.getElementById("aiMessages");
    const msg = document.createElement("div");
    msg.className = "ai-msg ai";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    const img = document.createElement("img");
    img.src = "/doala.png";
    img.alt = "AI";
    avatar.appendChild(img);

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    container.appendChild(msg);
  }

  function showTyping() {
    const container = document.getElementById("aiMessages");
    const msg = document.createElement("div");
    msg.className = "ai-msg ai";
    msg.id = "typing";
    msg.innerHTML = `<div class="avatar"><img src="/doala.png" alt="AI"></div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    container.appendChild(msg);
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  // --- Start ---
  init();
</script>

</body>
</html>

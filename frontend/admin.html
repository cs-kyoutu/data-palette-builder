<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>手順書 生成履歴</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6fa; color: #222; }

    header {
      background: #1a1a2e;
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header a { color: #aaa; font-size: 13px; text-decoration: none; margin-left: auto; }
    header a:hover { color: #fff; }

    .container { max-width: 1200px; margin: 24px auto; padding: 0 16px; }

    .stats { display: flex; gap: 16px; margin-bottom: 20px; }
    .stat-card {
      background: #fff;
      border-radius: 8px;
      padding: 14px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      min-width: 140px;
    }
    .stat-card .label { font-size: 12px; color: #888; margin-bottom: 4px; }
    .stat-card .value { font-size: 24px; font-weight: 700; color: #1a1a2e; }

    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .toolbar input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      outline: none;
    }
    .toolbar input:focus { border-color: #4f8ef7; }

    table {
      width: 100%;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-collapse: collapse;
      overflow: hidden;
    }
    thead tr { background: #1a1a2e; color: #fff; }
    th { padding: 12px 14px; text-align: center; font-size: 13px; font-weight: 500; }
    tbody tr { border-bottom: 1px solid #f0f0f0; cursor: pointer; transition: background .15s; }
    tbody tr:hover { background: #f0f4ff; }
    tbody tr.expanded { background: #eef3ff; }
    td { padding: 12px 14px; font-size: 13px; vertical-align: top; }
    td.date { color: #666; white-space: nowrap; }
    td.strategy { font-weight: 600; max-width: 200px; }
    td.summary { color: #444; max-width: 340px; }
    td.dl { text-align: center; }

    .dl-btn {
      display: inline-block;
      background: #4f8ef7;
      color: #fff;
      padding: 5px 14px;
      border-radius: 5px;
      font-size: 12px;
      text-decoration: none;
      white-space: nowrap;
    }
    .dl-btn:hover { background: #3a7be0; }
    .test-btn { display: inline-block; background: #eee; color: #666; border: none; padding: 4px 10px; border-radius: 5px; font-size: 11px; cursor: pointer; white-space: nowrap; margin-left: 4px; }
    .test-btn:hover { background: #ddd; }
    .test-btn.active { background: #ffeaa7; color: #856404; }
    tr.is-test td.date, tr.is-test td.strategy, tr.is-test td.summary { opacity: 0.4; }

    /* 대화 상세 패널 */
    .detail-row td { padding: 0; }
    .detail-panel {
      background: #f8f9ff;
      border-top: 2px solid #4f8ef7;
      padding: 20px 24px;
    }
    .detail-panel h3 { font-size: 14px; color: #1a1a2e; margin-bottom: 12px; }

    .conv-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
    .conv-tab {
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #fff;
      color: #555;
    }
    .conv-tab.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

    .conv-pane { display: none; }
    .conv-pane.active { display: block; }

    .message-list { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; }
    .message {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .message .role {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      white-space: nowrap;
      min-width: 50px;
      text-align: center;
    }
    .message.user .role { background: #e8f0fe; color: #3a6bc0; }
    .message.assistant .role { background: #e6f4ea; color: #2d6a4f; }
    .message .content {
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      flex: 1;
      max-height: 200px;
      overflow-y: auto;
    }

    .design-json {
      background: #1e1e2e;
      color: #cdd6f4;
      border-radius: 6px;
      padding: 14px;
      font-size: 11px;
      font-family: monospace;
      white-space: pre-wrap;
      max-height: 400px;
      overflow-y: auto;
    }

    .io-section { margin-bottom: 20px; }
    .io-section h4 { font-size: 13px; font-weight: 700; color: #1a1a2e; margin-bottom: 8px; }
    .io-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 6px; }
    .io-table th { background: #1a1a2e; color: #fff; padding: 6px 10px; text-align: left; font-weight: 500; }
    .io-table td { padding: 6px 10px; border-bottom: 1px solid #eee; vertical-align: top; }
    .io-table tbody tr:hover { background: #f5f7ff; }
    .io-table td.col-name { font-weight: 600; white-space: nowrap; }
    .io-table td.col-def { color: #444; }
    .io-table td.col-type { color: #888; white-space: nowrap; }
    .io-table td.col-desc { color: #555; }
    .table-label {
      display: inline-block; background: #e8f0fe; color: #3a5fc8;
      font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 4px; margin-bottom: 6px;
    }

    /* Weekly stats */
    .stats-section { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,.08); padding: 20px; margin-bottom: 20px; }
    .stats-section h2 { font-size: 14px; font-weight: 700; color: #1a1a2e; margin-bottom: 14px; display: flex; align-items: center; justify-content: space-between; }
    .weekly-table { width: 100%; border-collapse: collapse; font-size: 12px; overflow-x: auto; display: block; }
    .weekly-table th, .weekly-table td { padding: 6px 10px; text-align: center; white-space: nowrap; }
    .weekly-table thead tr:first-child th { background: #e8f0fe; color: #1a1a2e; font-weight: 700; border: 1px solid #cdd5e0; }
    .weekly-table thead tr:last-child th { background: #f5f7ff; color: #444; font-weight: 500; border: 1px solid #dde3ee; font-size: 11px; }
    .weekly-table tbody tr { border-bottom: 1px solid #f0f0f0; }
    .weekly-table tbody tr:hover { background: #f8f9ff; }
    .weekly-table td { border: 1px solid #eee; }
    .weekly-table td.week-label { text-align: left; font-weight: 600; color: #333; background: #fafbfc; }
    .weekly-table td.count { color: #1a1a2e; font-weight: 600; }
    .weekly-table td.good { color: #2d6a4f; }
    .weekly-table td.bad { color: #c0392b; }
    .weekly-table td.none { color: #888; }
    .csv-btn { font-size: 12px; padding: 5px 14px; border: 1px solid #4f8ef7; color: #4f8ef7; background: #fff; border-radius: 5px; cursor: pointer; }
    .csv-btn:hover { background: #f0f4ff; }

    .empty { text-align: center; padding: 60px; color: #aaa; font-size: 14px; }
    .loading { text-align: center; padding: 60px; color: #aaa; }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
      background: #e6f4ea;
      color: #2d6a4f;
      font-weight: 600;
    }
  </style>
</head>
<body>

<header>
  <h1>📋 手順書 生成履歴</h1>
  <a href="/">← メインへ戻る</a>
</header>

<div class="container">

  <!-- 週次集計 -->
  <div class="stats-section">
    <h2>
      📊 週次利用集計（月〜日）
      <button class="csv-btn" onclick="downloadWithAuth('/api/admin/weekly_stats/csv', 'weekly_stats.csv')">⬇ CSV</button>
    </h2>
    <div style="overflow-x:auto">
      <table class="weekly-table" id="weekly-table">
        <thead>
          <tr>
            <th rowspan="2" style="background:#1a1a2e;color:#fff;min-width:140px">週</th>
            <th colspan="5">a. 要件定義</th>
            <th colspan="5">b. テーブル定義書</th>
            <th colspan="5">c. 構築手順書</th>
          </tr>
          <tr>
            <th>利用回数</th><th>good</th><th>bad</th><th>未リアクション</th>
            <th>利用回数</th><th>good</th><th>bad</th><th>未リアクション</th>
            <th>利用回数</th><th>good</th><th>bad</th><th>未リアクション</th>
          </tr>
        </thead>
        <tbody id="weekly-body">
          <tr><td colspan="13" style="text-align:center;color:#aaa;padding:20px">読み込み中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">生成数（合計）</div>
      <div class="value" id="total-count">—</div>
    </div>
    <div class="stat-card">
      <div class="label">本日の生成数</div>
      <div class="value" id="today-count">—</div>
    </div>
  </div>

  <div class="toolbar">
    <input type="text" id="search" placeholder="施策名または概要で検索..." oninput="filterTable()">
  </div>

  <table id="main-table">
    <thead>
      <tr>
        <th>生成日時</th>
        <th>施策名</th>
        <th>手順書の概要</th>
        <th>ダウンロード</th>
      </tr>
    </thead>
    <tbody id="table-body">
      <tr><td colspan="4" class="loading">読み込み中...</td></tr>
    </tbody>
  </table>
</div>

<script>
const authHeaders = () => {
  const t = window.__APP_AUTH_TOKEN__;
  return t ? { 'Authorization': `Bearer ${t}` } : {};
};

let allSessions = [];
let expandedId = null;

async function loadSessions() {
  try {
    const res = await fetch('/api/admin/sessions?limit=200', { headers: authHeaders() });
    if (!res.ok) throw new Error(res.status);
    allSessions = await res.json();
    renderTable(allSessions);
    updateStats(allSessions);
  } catch (e) {
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="4" class="empty">データの読み込みに失敗しました: ${e}</td></tr>`;
  }
}

function updateStats(sessions) {
  document.getElementById('total-count').textContent = sessions.length;
  const today = new Date().toISOString().slice(0, 10);
  const todayCount = sessions.filter(s => (s.created_at || '').startsWith(today)).length;
  document.getElementById('today-count').textContent = todayCount;
}

function formatDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleString('ja-JP', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function renderTable(sessions) {
  const tbody = document.getElementById('table-body');
  if (!sessions.length) {
    tbody.innerHTML = '<tr><td colspan="4" class="empty">生成された手順書はありません</td></tr>';
    return;
  }
  tbody.innerHTML = sessions.map(s => `
    <tr class="data-row${s.is_test ? ' is-test' : ''}" data-id="${s.id}" onclick="toggleDetail('${s.id}')">
      <td class="date">${formatDate(s.created_at)}</td>
      <td class="strategy">${s.strategy_name || '（相談なし）'}</td>
      <td class="summary">${(s.summary || '').slice(0, 80)}${(s.summary || '').length > 80 ? '…' : ''}</td>
      <td class="dl">
        <a class="dl-btn" href="/api/download/${s.id}" onclick="event.stopPropagation()" download>⬇ Excel</a>
        <button class="test-btn${s.is_test ? ' active' : ''}" onclick="event.stopPropagation(); toggleTest('${s.id}', this)">${s.is_test ? '🧪 テスト除外中' : '🧪 テスト'}</button>
      </td>
    </tr>
    <tr class="detail-row" id="detail-${s.id}" style="display:none">
      <td colspan="4">
        <div class="detail-panel" id="panel-${s.id}">
          <div style="color:#888;font-size:12px">読み込み中...</div>
        </div>
      </td>
    </tr>
  `).join('');
}

async function toggleTest(sessionId, btn) {
  try {
    const res = await fetch(`/api/admin/sessions/${sessionId}/toggle_test`, {
      method: 'POST', headers: authHeaders()
    });
    if (!res.ok) throw new Error(res.status);
    const { is_test } = await res.json();
    // allSessionsのis_testを更新
    const s = allSessions.find(x => x.id === sessionId);
    if (s) s.is_test = is_test;
    // ボタンとtr表示を即時更新
    btn.textContent = is_test ? '🧪 テスト除外中' : '🧪 テスト';
    btn.classList.toggle('active', is_test);
    btn.closest('tr').classList.toggle('is-test', is_test);
    // 週次集計を再読み込み
    loadWeeklyStats();
  } catch (e) {
    alert('フラグの更新に失敗しました: ' + e);
  }
}

async function toggleDetail(sessionId) {
  const detailRow = document.getElementById(`detail-${sessionId}`);
  const dataRow = document.querySelector(`tr.data-row[data-id="${sessionId}"]`);

  if (expandedId === sessionId) {
    detailRow.style.display = 'none';
    dataRow.classList.remove('expanded');
    expandedId = null;
    return;
  }

  // 既存の展開行を閉じる
  if (expandedId) {
    document.getElementById(`detail-${expandedId}`).style.display = 'none';
    document.querySelector(`tr.data-row[data-id="${expandedId}"]`)?.classList.remove('expanded');
  }

  detailRow.style.display = '';
  dataRow.classList.add('expanded');
  expandedId = sessionId;

  const panel = document.getElementById(`panel-${sessionId}`);

  try {
    const res = await fetch(`/api/admin/sessions/${sessionId}`, { headers: authHeaders() });
    const data = await res.json();
    renderDetail(panel, data, sessionId);
  } catch (e) {
    panel.innerHTML = `<div style="color:red">詳細の読み込みに失敗しました: ${e}</div>`;
  }
}

function renderDetail(panel, data, sessionId) {
  const hasIo = (data.input_tables && data.input_tables.length > 0) || (data.output_mapping && data.output_mapping.columns && data.output_mapping.columns.length > 0);
  const tabs = [
    { id: 'io',     label: '📊 インプット/アウトプット', messages: null, type: 'io' },
    { id: 'phase1', label: '📝 Phase1 施策相談', messages: data.consultation_messages || [], type: 'msg' },
    { id: 'step1',  label: '🔍 Step1 方針決定', messages: data.messages || [], type: 'msg' },
    { id: 'step2',  label: '⚙️ Step2 設計',    messages: data.messages_step2 || [], type: 'msg' },
    { id: 'design', label: '📄 設計書JSON',     messages: null, type: 'json' },
  ].filter(t => {
    if (t.id === 'io') return hasIo;
    if (t.type === 'msg') return t.messages.length > 0;
    return true;
  });

  const firstTab = tabs[0]?.id || 'design';

  panel.innerHTML = `
    <h3>${data.strategy_name || '（施策名なし）'} — ${data.summary || ''}</h3>
    <div class="conv-tabs">
      ${tabs.map(t => `<div class="conv-tab${t.id === firstTab ? ' active' : ''}" onclick="switchTab('${sessionId}','${t.id}')" id="tab-${sessionId}-${t.id}">${t.label}</div>`).join('')}
    </div>
    ${tabs.map(t => `
      <div class="conv-pane${t.id === firstTab ? ' active' : ''}" id="pane-${sessionId}-${t.id}">
        ${t.type === 'msg'
          ? `<div class="message-list">${renderMessages(t.messages)}</div>`
          : t.type === 'io'
          ? renderIo(data)
          : `<div class="design-json">${JSON.stringify(data.design_doc, null, 2)}</div>`
        }
      </div>
    `).join('')}
  `;
}

function renderIo(data) {
  let html = '';

  // インプットテーブル
  const tables = data.input_tables || [];
  if (tables.length > 0) {
    html += `<div class="io-section"><h4>インプットテーブル</h4>`;
    for (const t of tables) {
      html += `<div class="table-label">📋 ${escHtml(t.table_name || '（テーブル名なし）')}</div>`;
      const cols = t.columns || [];
      if (cols.length > 0) {
        html += `<table class="io-table">
          <thead><tr><th>カラム名</th><th>型</th><th>説明</th></tr></thead>
          <tbody>${cols.map(c => `
            <tr>
              <td class="col-name">${escHtml(c.name || '')}</td>
              <td class="col-type">${escHtml(c.type || '')}</td>
              <td class="col-desc">${escHtml(c.description || '')}</td>
            </tr>`).join('')}
          </tbody>
        </table>`;
      } else {
        html += `<div style="font-size:12px;color:#aaa;margin-bottom:8px">カラム定義なし</div>`;
      }
    }
    html += `</div>`;
  }

  // アウトプット定義
  const outCols = (data.output_mapping && data.output_mapping.columns) ? data.output_mapping.columns : [];
  if (outCols.length > 0) {
    html += `<div class="io-section"><h4>アウトプット定義</h4>
      <table class="io-table">
        <thead><tr><th>カラム名</th><th>定義・説明</th></tr></thead>
        <tbody>${outCols.map(c => `
          <tr>
            <td class="col-name">${escHtml(c.name || '')}</td>
            <td class="col-def">${escHtml(c.definition || '')}</td>
          </tr>`).join('')}
        </tbody>
      </table>
    </div>`;
  }

  if (!html) html = '<div style="color:#aaa;font-size:12px;padding:10px">データなし</div>';
  return html;
}

function renderMessages(messages) {
  if (!messages.length) return '<div style="color:#aaa;font-size:12px;padding:10px">会話なし</div>';
  return messages.map(m => `
    <div class="message ${m.role}">
      <span class="role">${m.role === 'user' ? '👤 ユーザー' : '🤖 AI'}</span>
      <div class="content">${escHtml(m.content || '')}</div>
    </div>
  `).join('');
}

function switchTab(sessionId, tabId) {
  document.querySelectorAll(`[id^="tab-${sessionId}-"]`).forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`[id^="pane-${sessionId}-"]`).forEach(el => el.classList.remove('active'));
  document.getElementById(`tab-${sessionId}-${tabId}`).classList.add('active');
  document.getElementById(`pane-${sessionId}-${tabId}`).classList.add('active');
}

function filterTable() {
  const q = document.getElementById('search').value.toLowerCase();
  const filtered = allSessions.filter(s =>
    (s.strategy_name || '').toLowerCase().includes(q) ||
    (s.summary || '').toLowerCase().includes(q)
  );
  renderTable(filtered);
  updateStats(filtered);
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

async function loadWeeklyStats() {
  try {
    const res = await fetch('/api/admin/weekly_stats', { headers: authHeaders() });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const tbody = document.getElementById('weekly-body');
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="13" style="text-align:center;color:#aaa;padding:20px">データなし</td></tr>';
      return;
    }
    tbody.innerHTML = data.map(r => `
      <tr>
        <td class="week-label">${escHtml(r.week)}</td>
        <td class="count">${r.p1.count}</td><td class="good">${r.p1.good}</td><td class="bad">${r.p1.bad}</td><td class="none">${r.p1.none}</td>
        <td class="count">${r.p2.count}</td><td class="good">${r.p2.good}</td><td class="bad">${r.p2.bad}</td><td class="none">${r.p2.none}</td>
        <td class="count">${r.p3.count}</td><td class="good">${r.p3.good}</td><td class="bad">${r.p3.bad}</td><td class="none">${r.p3.none}</td>
      </tr>
    `).join('');
  } catch(e) {
    document.getElementById('weekly-body').innerHTML =
      `<tr><td colspan="13" style="text-align:center;color:red;padding:20px">読み込み失敗: ${e}</td></tr>`;
  }
}

function downloadWithAuth(url, filename) {
  const t = window.__APP_AUTH_TOKEN__;
  const headers = t ? { 'Authorization': `Bearer ${t}` } : {};
  fetch(url, { headers })
    .then(r => r.blob())
    .then(blob => {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = filename || 'download.csv';
      a.click();
    });
}

loadWeeklyStats();
loadSessions();
</script>
</body>
</html>

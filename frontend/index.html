<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>データパレット構築手順書ジェネレータ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0CAAEB;
      --primary-dark: #0B4C6F;
      --primary-light: #36C1FA;
      --primary-bg: #F0F9FF;
      --bg: #f7f9fb;
      --surface: #ffffff;
      --text: #5B5B5F;
      --text-muted: #AEAEB2;
      --border: #e5eaf0;
      --accent-green: #0A8F3C;
      --accent-orange: #D48806;
    }
    body {
      font-family: "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.75;
    }

    /* Header */
    .header {
      background: var(--primary-light);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(11,76,111,0.10);
      z-index: 10;
    }
    .header h1 { font-size: 16px; font-weight: 700; }

    /* Main Layout */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 1200px;
      margin: 0 auto 16px;
    }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .panel-header h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-dark);
    }
    .panel-header .badge {
      font-size: 11px;
      padding: 2px 8px;
      background: var(--primary-bg);
      color: var(--primary);
      border-radius: 4px;
      font-weight: 500;
    }

    /* Input method toggle */
    .input-method-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .toggle-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      border-color: var(--primary);
      background: var(--primary-bg);
      color: var(--primary);
      font-weight: 700;
    }

    /* Preset search & chips */
    .preset-search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .preset-search {
      width: 100%;
      padding: 10px 12px 10px 34px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
    }
    .preset-search:focus { border-color: var(--primary); outline: none; }
    .preset-search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .preset-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .preset-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-chip:hover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .preset-chip.selected {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
      font-weight: 600;
    }
    .preset-chip.selected::after {
      content: "✕";
      margin-left: 4px;
      font-size: 10px;
      opacity: 0.8;
    }
    .preset-chip.hidden { display: none; }
    .preset-no-match {
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 0;
      display: none;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
      background: var(--bg);
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .drop-zone p { font-size: 13px; color: var(--text-muted); }
    .drop-zone .icon { font-size: 28px; margin-bottom: 6px; }
    .drop-zone input { display: none; }

    /* File list */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--primary-bg);
      border-radius: 6px;
      font-size: 12px;
    }
    .file-item .name { color: var(--primary); font-weight: 500; }
    .file-item .remove {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
    }
    .file-item .remove:hover { color: #E53E3E; }

    /* Preview table */
    .preview-area {
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11.5px;
    }
    .preview-table th {
      background: var(--primary-dark);
      color: white;
      padding: 6px 10px;
      text-align: left;
      font-weight: 500;
      position: sticky;
      top: 0;
    }
    .preview-table td {
      padding: 5px 10px;
      border-bottom: 1px solid var(--border);
    }
    .preview-table tr:hover td { background: var(--primary-bg); }
    .table-name-header {
      background: var(--bg);
      padding: 6px 10px;
      font-weight: 700;
      font-size: 12px;
      color: var(--primary-dark);
      border-bottom: 1px solid var(--border);
    }
    .derived-tag {
      display: inline-block;
      padding: 1px 6px;
      background: #FFF7E6;
      color: var(--accent-orange);
      border-radius: 3px;
      font-size: 10px;
      font-weight: 700;
    }

    /* Text input for output */
    .text-input-area {
      width: 100%;
      min-height: 120px;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      line-height: 1.6;
    }
    .text-input-area:focus { border-color: var(--primary); outline: none; }
    .text-input-area::placeholder { color: var(--text-muted); }

    /* Generate button */
    .generate-area {
      max-width: 1200px;
      margin: 0 auto 16px;
      text-align: center;
    }
    .generate-btn {
      padding: 14px 48px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .generate-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(12,170,235,0.25); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* AI Chat area */
    .ai-area {
      max-width: 1200px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .ai-area-header {
      background: var(--bg);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-dark);
      border-bottom: 1px solid var(--border);
    }
    .ai-messages {
      padding: 16px;
      max-height: 400px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ai-msg {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ai-msg .avatar {
      font-size: 10px; font-weight: 700; flex-shrink: 0;
      display: flex; align-items: flex-start; justify-content: center;
    }
    .ai-msg.ai .avatar {
      width: 40px; height: 40px;
      background: none; border: none; padding: 0;
    }
    .ai-msg.ai .avatar img { width: 40px; height: 40px; object-fit: contain; display: block; }
    .ai-msg.user .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      background: var(--primary-dark); color: white;
    }
    .ai-msg .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      max-width: 90%;
    }
    .ai-msg.ai .bubble { background: var(--bg); border: 1px solid var(--border); }
    .ai-msg.user .bubble { background: var(--primary); color: white; }
    .ai-msg.user { flex-direction: row-reverse; }

    /* Chat input */
    .ai-input-area {
      display: none;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      gap: 10px;
      align-items: flex-end;
    }
    .ai-input-area.visible { display: flex; }
    .ai-input-area textarea {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 100px;
      color: var(--text);
    }
    .ai-input-area textarea:focus { border-color: var(--primary); outline: none; }
    .ai-input-area .send-btn {
      width: 42px; height: 42px;
      background: var(--primary); color: white;
      border: none; border-radius: 8px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .ai-input-area .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Download */
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      padding: 12px 24px;
      background: var(--accent-green);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
    }
    .download-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; padding: 6px 0; }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
      opacity: 0.6;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-7px); }
    }

    /* Claude-style question cards */
    .question-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      max-width: 90%;
    }
    .question-card {
      padding: 12px 16px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
    .question-card:hover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .question-card.selected {
      border-color: var(--primary);
      background: var(--primary-bg);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .question-card .card-label {
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 2px;
    }
    .question-card .card-desc {
      font-size: 12px;
      color: var(--text-muted);
    }
    .question-other {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      max-width: 90%;
    }
    .question-other input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .question-other input:focus { border-color: var(--primary); }
    .question-other input::placeholder { color: var(--text-muted); }
    .question-other .send-card-btn {
      padding: 10px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .question-other .send-card-btn:hover { background: var(--primary-dark); }
    .question-other .send-card-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <span style="font-size:20px">&#128295;</span>
  <h1>データパレット構築手順書ジェネレータ</h1>
</div>

<div class="main-content">
  <!-- 2カラム: インプット / アウトプット -->
  <div class="columns">
    <!-- ===== インプット（左） ===== -->
    <div class="panel">
      <div class="panel-header">
        <h2>インプット（テーブル定義書）</h2>
        <span class="badge" id="inputCount">0 テーブル</span>
      </div>

      <div class="input-method-toggle">
        <button class="toggle-btn active" onclick="switchInputMethod('preset')">プリセット</button>
        <button class="toggle-btn" onclick="switchInputMethod('upload')">ファイルアップロード</button>
      </div>

      <!-- プリセット -->
      <div id="inputPreset">
        <div class="preset-search-wrap">
          <span class="preset-search-icon">🔍</span>
          <input type="text" class="preset-search" id="presetSearch" placeholder="業界を検索..." oninput="filterPresets()">
        </div>
        <div class="preset-chips" id="presetChips"></div>
        <div class="preset-no-match" id="presetNoMatch">該当する業界がありません</div>
      </div>

      <!-- ファイルアップロード -->
      <div id="inputUpload" class="hidden">
        <div class="drop-zone" id="inputDropZone" onclick="document.getElementById('inputFileInput').click()">
          <div class="icon">&#128196;</div>
          <p>テーブル定義書をドロップ<br>または クリックして選択（Excel / CSV）</p>
          <input type="file" id="inputFileInput" accept=".xlsx,.xls,.csv" multiple>
        </div>
      </div>

      <div class="file-list" id="inputFileList"></div>

      <!-- プレビュー -->
      <div class="preview-area hidden" id="inputPreview"></div>
    </div>

    <!-- ===== アウトプット（右） ===== -->
    <div class="panel">
      <div class="panel-header">
        <h2>アウトプット（マッピング定義）</h2>
        <span class="badge" id="outputCount">0 カラム</span>
      </div>

      <div class="input-method-toggle">
        <button class="toggle-btn active" onclick="switchOutputMethod('upload')">ファイルアップロード</button>
        <button class="toggle-btn" onclick="switchOutputMethod('text')">テキスト入力</button>
      </div>

      <!-- ファイルアップロード -->
      <div id="outputUpload">
        <div class="drop-zone" id="outputDropZone" onclick="document.getElementById('outputFileInput').click()">
          <div class="icon">&#128203;</div>
          <p>マッピング定義ファイルをドロップ<br>または クリックして選択（Excel / CSV）</p>
          <input type="file" id="outputFileInput" accept=".xlsx,.xls,.csv">
        </div>
      </div>

      <!-- テキスト入力 -->
      <div id="outputText" class="hidden">
        <textarea class="text-input-area" id="outputTextInput"
          placeholder="最終テーブルのカラム定義をテキストで入力&#10;&#10;例:&#10;顧客ID - 顧客テーブルの顧客ID&#10;メールアドレス - 顧客テーブルのメールアドレス&#10;最終カート投入日 - webアクセスログから算出&#10;カート投入商品名1 - 商品テーブルの商品名"></textarea>
      </div>

      <div class="file-list" id="outputFileList"></div>

      <!-- プレビュー -->
      <div class="preview-area hidden" id="outputPreview"></div>
    </div>
  </div>

  <!-- 生成ボタン -->
  <div class="generate-area">
    <button class="generate-btn" id="generateBtn" onclick="generate()" disabled>手順書を生成する</button>
  </div>

  <!-- AIエリア -->
  <div class="ai-area hidden" id="aiArea">
    <div class="ai-area-header">AI アシスタント</div>
    <div class="ai-messages" id="aiMessages"></div>
    <div class="ai-input-area" id="aiInputArea">
      <textarea id="aiInput" placeholder="回答を入力..." rows="1"
        onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}"></textarea>
      <button class="send-btn" id="aiSendBtn" onclick="sendChat()">&#10148;</button>
    </div>
  </div>
</div>

<script>
  // --- State ---
  let inputTables = [];       // [{table_name, columns: [{name, type, description}]}]
  let outputMapping = null;   // {columns: [{name, definition, source_column, source_table}]}
  let outputTextMode = false;
  let sessionId = null;
  let isLoading = false;
  let industriesData = {};

  // --- Init ---
  async function init() {
    try {
      const res = await fetch("/api/industries");
      industriesData = await res.json();
      const chipsContainer = document.getElementById("presetChips");
      for (const [key, ind] of Object.entries(industriesData)) {
        const chip = document.createElement("button");
        chip.className = "preset-chip";
        chip.dataset.key = key;
        chip.textContent = ind.label;
        chip.onclick = () => togglePreset(key);
        chipsContainer.appendChild(chip);
      }
    } catch(e) { console.error(e); }

    setupDropZone("inputDropZone", "inputFileInput", handleInputFiles);
    setupDropZone("outputDropZone", "outputFileInput", handleOutputFiles);
  }
  init();

  // --- Drop zone setup ---
  function setupDropZone(zoneId, inputId, handler) {
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);

    zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("dragover"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
    zone.addEventListener("drop", e => {
      e.preventDefault();
      zone.classList.remove("dragover");
      handler(e.dataTransfer.files);
    });
    input.addEventListener("change", e => handler(e.target.files));
  }

  // --- Input method toggle ---
  function switchInputMethod(method) {
    document.querySelectorAll(".panel:first-child .toggle-btn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    document.getElementById("inputPreset").classList.toggle("hidden", method !== "preset");
    document.getElementById("inputUpload").classList.toggle("hidden", method !== "upload");

    if (method === "preset" && selectedPresetKey) {
      togglePreset(selectedPresetKey);
    }
  }

  function switchOutputMethod(method) {
    outputTextMode = (method === "text");
    document.querySelectorAll(".panel:last-child .toggle-btn").forEach(b => b.classList.remove("active"));
    event.target.classList.add("active");
    document.getElementById("outputUpload").classList.toggle("hidden", method !== "upload");
    document.getElementById("outputText").classList.toggle("hidden", method !== "text");
    updateGenerateBtn();
  }

  // --- Preset ---
  let selectedPresetKey = null;

  function togglePreset(key) {
    const chips = document.querySelectorAll(".preset-chip");
    if (selectedPresetKey === key) {
      // Deselect
      selectedPresetKey = null;
      chips.forEach(c => c.classList.remove("selected"));
      inputTables = [];
      renderInputPreview();
      updateGenerateBtn();
      return;
    }
    // Select
    selectedPresetKey = key;
    chips.forEach(c => c.classList.toggle("selected", c.dataset.key === key));
    inputTables = industriesData[key].tables.map(t => ({
      table_name: t.table_name,
      columns: t.columns.map(c => ({ name: c.name, type: c.type || "", description: c.description || "" })),
    }));
    renderInputPreview();
    updateGenerateBtn();
  }

  function filterPresets() {
    const query = document.getElementById("presetSearch").value.toLowerCase();
    const chips = document.querySelectorAll(".preset-chip");
    let visibleCount = 0;
    chips.forEach(chip => {
      const match = !query || chip.textContent.toLowerCase().includes(query);
      chip.classList.toggle("hidden", !match);
      if (match) visibleCount++;
    });
    document.getElementById("presetNoMatch").style.display = visibleCount === 0 ? "block" : "none";
  }

  // --- File upload handlers ---
  async function handleInputFiles(files) {
    for (const file of files) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("file_type", "input");

      try {
        const res = await fetch("/api/upload", { method: "POST", body: formData });
        const data = await res.json();
        if (data.tables) {
          for (const t of data.tables) {
            const existing = inputTables.findIndex(x => x.table_name === t.table_name);
            if (existing >= 0) inputTables[existing] = t;
            else inputTables.push(t);
          }
          addInputFileItem(file.name);
        }
      } catch(e) {
        console.error(e);
        alert("ファイル解析に失敗しました: " + file.name);
      }
    }
    renderInputPreview();
    updateGenerateBtn();
  }

  async function handleOutputFiles(files) {
    const file = files[0];
    const formData = new FormData();
    formData.append("file", file);
    formData.append("file_type", "output");

    try {
      const res = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();
      if (data.mapping) {
        outputMapping = data.mapping;
        document.getElementById("outputFileList").innerHTML = "";
        addOutputFileItem(file.name);
        renderOutputPreview();
      }
    } catch(e) {
      console.error(e);
      alert("ファイル解析に失敗しました");
    }
    updateGenerateBtn();
  }

  function addInputFileItem(name) {
    const list = document.getElementById("inputFileList");
    const item = document.createElement("div");
    item.className = "file-item";
    item.innerHTML = `<span class="name">${name}</span><span class="remove" onclick="this.parentElement.remove()">&#10005;</span>`;
    list.appendChild(item);
  }

  function addOutputFileItem(name) {
    const list = document.getElementById("outputFileList");
    const item = document.createElement("div");
    item.className = "file-item";
    item.innerHTML = `<span class="name">${name}</span><span class="remove" onclick="removeOutputFile(this)">&#10005;</span>`;
    list.appendChild(item);
  }

  function removeOutputFile(el) {
    outputMapping = null;
    el.parentElement.remove();
    document.getElementById("outputPreview").classList.add("hidden");
    document.getElementById("outputCount").textContent = "0 カラム";
    updateGenerateBtn();
  }

  // --- Preview rendering ---
  function renderInputPreview() {
    const area = document.getElementById("inputPreview");
    const count = document.getElementById("inputCount");
    if (!inputTables.length) {
      area.classList.add("hidden");
      count.textContent = "0 テーブル";
      return;
    }
    count.textContent = `${inputTables.length} テーブル`;
    let html = "";
    for (const table of inputTables) {
      html += `<div class="table-name-header">${table.table_name}（${table.columns.length}カラム）</div>`;
      html += `<table class="preview-table"><tr><th>カラム名</th><th>型</th><th>説明</th></tr>`;
      for (const col of table.columns) {
        html += `<tr><td>${col.name}</td><td>${col.type || "-"}</td><td>${col.description || "-"}</td></tr>`;
      }
      html += `</table>`;
    }
    area.innerHTML = html;
    area.classList.remove("hidden");
  }

  function renderOutputPreview() {
    const area = document.getElementById("outputPreview");
    const count = document.getElementById("outputCount");
    if (!outputMapping || !outputMapping.columns.length) {
      area.classList.add("hidden");
      count.textContent = "0 カラム";
      return;
    }
    count.textContent = `${outputMapping.columns.length} カラム`;
    let html = `<table class="preview-table"><tr><th>カラム名</th><th>定義</th><th>インプットカラム</th><th>インプットデータ</th></tr>`;
    for (const col of outputMapping.columns) {
      const srcCol = col.source_column || `<span class="derived-tag">加工で生成</span>`;
      html += `<tr><td>${col.name}</td><td>${col.definition || "-"}</td><td>${srcCol}</td><td>${col.source_table || "-"}</td></tr>`;
    }
    html += `</table>`;
    area.innerHTML = html;
    area.classList.remove("hidden");
  }

  // --- Generate button state ---
  function updateGenerateBtn() {
    const hasInput = inputTables.length > 0;
    const hasOutput = outputTextMode
      ? document.getElementById("outputTextInput").value.trim().length > 0
      : (outputMapping && outputMapping.columns.length > 0);
    document.getElementById("generateBtn").disabled = !(hasInput && hasOutput);
  }
  document.getElementById("outputTextInput").addEventListener("input", updateGenerateBtn);

  // --- Generate ---
  async function generate() {
    if (isLoading) return;
    isLoading = true;
    document.getElementById("generateBtn").disabled = true;

    // アウトプットがテキストモードの場合、テキストからマッピングを構築
    let finalOutputMapping = outputMapping;
    if (outputTextMode) {
      const text = document.getElementById("outputTextInput").value.trim();
      // テキストを簡易パース
      const lines = text.split("\n").filter(l => l.trim());
      finalOutputMapping = {
        columns: lines.map(line => {
          const parts = line.split(/[-\u2013\u2014\u2015\u30fc]/).map(s => s.trim());
          return {
            name: parts[0] || line.trim(),
            definition: parts[1] || "",
            source_column: "",
            source_table: "",
          };
        })
      };
    }

    // AIエリア表示
    const aiArea = document.getElementById("aiArea");
    aiArea.classList.remove("hidden");
    showAiMessage("user", "手順書の生成を開始します...");
    showTyping();

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id: sessionId,
          input_tables: inputTables,
          output_mapping: finalOutputMapping,
        }),
      });
      const data = await res.json();
      sessionId = data.session_id;
      removeTyping();

      showAiMessage("ai", data.reply, data.download_url);

      if (data.status === "asking") {
        // 選択肢カードが表示されていなければ通常入力を表示
        const parsed = parseAiQuestions(data.reply);
        if (!parsed) {
          document.getElementById("aiInputArea").classList.add("visible");
        }
      } else {
        document.getElementById("aiInputArea").classList.remove("visible");
      }
    } catch(e) {
      removeTyping();
      showAiMessage("ai", "エラーが発生しました。もう一度お試しください。");
    }

    isLoading = false;
    updateGenerateBtn();
  }

  // --- Chat ---
  async function sendChat() {
    const input = document.getElementById("aiInput");
    const text = input.value.trim();
    if (!text || isLoading || !sessionId) return;

    isLoading = true;
    input.value = "";
    showAiMessage("user", text);
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await res.json();
      removeTyping();
      showAiMessage("ai", data.reply, data.download_url);

      if (data.status === "done") {
        document.getElementById("aiInputArea").classList.remove("visible");
      }
    } catch(e) {
      removeTyping();
      showAiMessage("ai", "エラーが発生しました。");
    }

    isLoading = false;
  }

  // --- AI message helpers ---
  function showAiMessage(role, text, downloadUrl) {
    const container = document.getElementById("aiMessages");
    const msg = document.createElement("div");
    msg.className = `ai-msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (role === "ai") {
      const img = document.createElement("img");
      img.src = "/doala.png";
      img.alt = "AI";
      avatar.appendChild(img);
    } else {
      avatar.textContent = "You";
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    // AIの質問をパースして選択肢カードを表示
    if (role === "ai" && !downloadUrl) {
      const parsed = parseAiQuestions(text);
      if (parsed) {
        // 質問テキスト部分
        const textSpan = document.createElement("span");
        textSpan.textContent = parsed.intro;
        bubble.appendChild(textSpan);

        // 選択肢カード
        const cards = document.createElement("div");
        cards.className = "question-cards";
        parsed.options.forEach((opt, i) => {
          const card = document.createElement("div");
          card.className = "question-card";
          card.innerHTML = `<div class="card-label">${opt.label}</div>${opt.desc ? `<div class="card-desc">${opt.desc}</div>` : ""}`;
          card.onclick = () => {
            cards.querySelectorAll(".question-card").forEach(c => c.classList.remove("selected"));
            card.classList.add("selected");
            // 選択肢をクリックしたら即送信
            removeQuestionUI();
            sendAnswer(opt.label);
          };
          cards.appendChild(card);
        });
        bubble.appendChild(cards);

        // テキスト入力（その他）
        const otherRow = document.createElement("div");
        otherRow.className = "question-other";
        otherRow.id = "questionOtherRow";
        const otherInput = document.createElement("input");
        otherInput.type = "text";
        otherInput.placeholder = "その他（自由入力）";
        otherInput.onkeydown = (e) => {
          if (e.key === "Enter" && otherInput.value.trim()) {
            removeQuestionUI();
            sendAnswer(otherInput.value.trim());
          }
        };
        const otherBtn = document.createElement("button");
        otherBtn.className = "send-card-btn";
        otherBtn.textContent = "送信";
        otherBtn.onclick = () => {
          if (otherInput.value.trim()) {
            removeQuestionUI();
            sendAnswer(otherInput.value.trim());
          }
        };
        otherRow.appendChild(otherInput);
        otherRow.appendChild(otherBtn);
        bubble.appendChild(otherRow);

        // 通常の入力エリアは非表示
        document.getElementById("aiInputArea").classList.remove("visible");
      } else {
        bubble.textContent = text;
      }
    } else {
      bubble.textContent = text;
    }

    if (downloadUrl) {
      const link = document.createElement("a");
      link.href = downloadUrl;
      link.className = "download-btn";
      link.textContent = "手順書をダウンロード (.xlsx)";
      link.download = "";
      bubble.appendChild(document.createElement("br"));
      bubble.appendChild(link);
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function parseAiQuestions(text) {
    // A) B) C) or 1) 2) 3) or ① ② ③ 形式の選択肢を検出
    const lines = text.split("\n");
    const optionPattern = /^\s*(?:[A-C]\)|[①②③]|[1-3]\))\s*(.+)/;
    const options = [];
    const introLines = [];
    let foundOptions = false;

    for (const line of lines) {
      const match = line.match(optionPattern);
      if (match) {
        foundOptions = true;
        // ラベルと説明を分離（「:」「→」「-」で区切る）
        const parts = match[1].split(/[:：→\-]/).map(s => s.trim());
        options.push({
          label: parts[0],
          desc: parts.length > 1 ? parts.slice(1).join(" - ") : "",
        });
      } else if (!foundOptions) {
        introLines.push(line);
      }
    }

    if (options.length >= 2) {
      return { intro: introLines.join("\n").trim(), options };
    }
    return null; // 選択肢が見つからない場合はnull
  }

  function removeQuestionUI() {
    // 選択肢カードとその他入力を無効化
    document.querySelectorAll(".question-cards").forEach(el => {
      el.querySelectorAll(".question-card").forEach(c => {
        c.style.pointerEvents = "none";
        c.style.opacity = "0.5";
      });
    });
    document.querySelectorAll(".question-other").forEach(el => {
      el.style.pointerEvents = "none";
      el.style.opacity = "0.5";
    });
  }

  async function sendAnswer(answer) {
    if (isLoading || !sessionId) return;
    isLoading = true;
    showAiMessage("user", answer);
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: answer }),
      });
      const data = await res.json();
      removeTyping();
      showAiMessage("ai", data.reply, data.download_url);

      if (data.status === "asking") {
        // 選択肢がなければ通常入力を表示
        const parsed = parseAiQuestions(data.reply);
        if (!parsed) {
          document.getElementById("aiInputArea").classList.add("visible");
        }
      } else {
        document.getElementById("aiInputArea").classList.remove("visible");
      }
    } catch(e) {
      removeTyping();
      showAiMessage("ai", "エラーが発生しました。");
    }
    isLoading = false;
  }

  function showTyping() {
    const container = document.getElementById("aiMessages");
    const msg = document.createElement("div");
    msg.className = "ai-msg ai";
    msg.id = "typing";
    msg.innerHTML = `<div class="avatar"><img src="/doala.png" alt="AI"></div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }
</script>

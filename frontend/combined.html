<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>データパレット構築 設計書・手順書ジェネレーター</title>
  <link rel="icon" type="image/png" href="/bdash_hakase.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary: #0CAAEB;
      --primary-dark: #0B4C6F;
      --primary-light: #36C1FA;
      --primary-bg: #F0F9FF;
      --bg: #f7f9fb;
      --surface: #ffffff;
      --text: #5B5B5F;
      --text-muted: #AEAEB2;
      --border: #e5eaf0;
      --accent-green: #0A8F3C;
      --accent-orange: #D48806;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.75;
    }

    /* Header */
    .header {
      background: var(--primary-light);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 8px rgba(11,76,111,0.10);
      z-index: 10;
    }
    .header h1 { font-size: 16px; font-weight: 700; }

    /* Main Layout */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }
    .content-wrapper {
      max-width: 900px;
      margin: 0 auto;
    }
    .columns {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 16px;
    }

    /* Panel */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .panel-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }
    .panel-header h2 {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-dark);
    }
    .panel-header .badge {
      font-size: 11px;
      padding: 2px 8px;
      background: var(--primary-bg);
      color: var(--primary);
      border-radius: 4px;
      font-weight: 500;
    }

    /* Input method toggle */
    .input-method-toggle {
      display: flex;
      gap: 6px;
      margin-bottom: 12px;
    }
    .toggle-btn {
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      background: var(--surface);
      color: var(--text);
      font-family: inherit;
      transition: all 0.15s;
    }
    .toggle-btn.active {
      border-color: var(--primary);
      background: var(--primary-bg);
      color: var(--primary);
      font-weight: 700;
    }

    /* Preset search & chips */
    .preset-search-wrap {
      position: relative;
      margin-bottom: 10px;
    }
    .preset-search {
      width: 100%;
      padding: 10px 12px 10px 34px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
    }
    .preset-search:focus { border-color: var(--primary); outline: none; }
    .preset-search-icon {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      color: var(--text-muted);
      pointer-events: none;
    }
    .preset-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }
    .preset-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 6px 14px;
      border: 1.5px solid var(--border);
      border-radius: 20px;
      font-size: 12px;
      font-family: inherit;
      color: var(--text);
      background: var(--surface);
      cursor: pointer;
      transition: all 0.15s;
    }
    .preset-chip:hover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .preset-chip.selected {
      border-color: var(--primary);
      background: var(--primary);
      color: white;
      font-weight: 600;
    }
    .preset-chip.selected::after {
      content: "\2715";
      margin-left: 4px;
      font-size: 10px;
      opacity: 0.8;
    }
    .preset-chip.hidden { display: none; }
    .preset-no-match {
      font-size: 12px;
      color: var(--text-muted);
      padding: 4px 0;
      display: none;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 10px;
      background: var(--bg);
    }
    .drop-zone:hover, .drop-zone.dragover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .drop-zone p { font-size: 13px; color: var(--text-muted); }
    .drop-zone .icon { font-size: 28px; margin-bottom: 6px; }
    .drop-zone input { display: none; }

    /* File list */
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: var(--primary-bg);
      border-radius: 6px;
      font-size: 12px;
    }
    .file-item .name { color: var(--primary); font-weight: 500; }
    .file-item .remove {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 14px;
    }
    .file-item .remove:hover { color: #E53E3E; }

    /* Text input for output */
    .text-input-area {
      width: 100%;
      min-height: 120px;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      resize: vertical;
      line-height: 1.6;
    }
    .text-input-area:focus { border-color: var(--primary); outline: none; }
    .text-input-area::placeholder { color: var(--text-muted); }
    .text-ok-btn {
      display: block;
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: var(--primary);
      color: white;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
    }
    .text-ok-btn:hover { background: var(--primary-dark); }

    /* Input preview */
    .input-preview-section { margin-bottom: 12px; }
    .input-preview-section summary {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-dark);
      cursor: pointer;
      padding: 6px 0;
    }
    .input-preview-section summary::marker { color: var(--primary); }
    .input-preview-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 11px;
      margin-top: 4px;
    }
    .input-preview-table th {
      background: var(--primary-bg);
      color: var(--primary-dark);
      font-weight: 600;
      text-align: left;
      padding: 4px 8px;
      border: 1px solid var(--border);
    }
    .input-preview-table td {
      padding: 3px 8px;
      border: 1px solid var(--border);
      color: var(--text);
    }
    .input-preview-table tr:nth-child(even) td { background: #fafbfc; }
    .cid-badge {
      display: inline-block;
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 4px;
      background: var(--primary);
      color: white;
      margin-left: 4px;
    }

    /* Generate button */
    .generate-area {
      margin-bottom: 16px;
      text-align: center;
    }
    .generate-btn {
      width: 100%;
      padding: 14px 48px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }
    .generate-btn:hover { background: var(--primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(12,170,235,0.25); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

    /* AI Chat area */
    .ai-area {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .ai-area-header {
      background: var(--bg);
      padding: 10px 16px;
      font-size: 13px;
      font-weight: 700;
      color: var(--primary-dark);
      border-bottom: 1px solid var(--border);
    }
    .ai-messages {
      padding: 16px;
      max-height: 60vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .ai-msg {
      display: flex;
      gap: 10px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .ai-msg .avatar {
      font-size: 10px; font-weight: 700; flex-shrink: 0;
      display: flex; align-items: flex-start; justify-content: center;
    }
    .ai-msg.ai .avatar {
      width: 40px; height: 40px;
      background: none; border: none; padding: 0;
    }
    .ai-msg.ai .avatar img { width: 40px; height: 40px; object-fit: contain; display: block; }
    .ai-msg.user .avatar {
      display: none;
    }
    .ai-msg .bubble {
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.8;
      white-space: pre-wrap;
      max-width: 90%;
    }
    .ai-msg.ai .bubble { background: var(--bg); border: 1px solid var(--border); }
    .ai-msg.user .bubble { background: var(--primary); color: white; }
    .ai-msg.user { flex-direction: row-reverse; }

    /* Chat input */
    .ai-input-area {
      display: none;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      gap: 10px;
      align-items: flex-end;
    }
    .ai-input-area.visible { display: flex; }
    .ai-input-area textarea {
      flex: 1;
      padding: 10px 12px;
      border: 2px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      min-height: 42px;
      max-height: 100px;
      color: var(--text);
    }
    .ai-input-area textarea:focus { border-color: var(--primary); outline: none; }
    .ai-input-area .send-btn {
      width: 42px; height: 42px;
      background: var(--primary); color: white;
      border: none; border-radius: 8px;
      cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
    }
    .ai-input-area .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Download buttons */
    .download-area {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      flex-wrap: wrap;
    }
    .download-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      font-family: inherit;
    }
    .download-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .download-btn.primary {
      background: var(--accent-green);
      color: white;
      border: none;
    }
    .download-btn.outlined {
      background: var(--surface);
      color: var(--primary-dark);
      border: 2px solid var(--border);
    }
    .procedure-text-wrapper {
      margin: 12px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }
    .procedure-text-toggle {
      display: block;
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: none;
      text-align: left;
      font-size: 13px;
      font-family: inherit;
      color: var(--primary-dark);
      cursor: pointer;
      font-weight: 600;
    }
    .procedure-text-toggle:hover { background: var(--primary-bg); }
    .procedure-text-content {
      padding: 14px;
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      background: var(--surface);
      max-height: 500px;
      overflow-y: auto;
      font-family: "Noto Sans JP", monospace;
    }
    .procedure-text-copy {
      display: block;
      width: 100%;
      padding: 8px;
      background: var(--primary);
      color: white;
      border: none;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }
    .procedure-text-copy:hover { background: var(--primary-dark); }
    .download-btn.outlined:hover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }

    /* Design preview */
    .design-preview {
      background: var(--surface);
      border: 2px solid var(--primary);
      border-radius: 12px;
      padding: 20px;
      margin: 12px 0;
    }
    .design-preview-header {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 14px;
      padding-bottom: 8px;
      border-bottom: 2px solid var(--primary-bg);
    }
    .design-preview-section {
      margin-bottom: 14px;
    }
    .design-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .design-value {
      font-size: 13px;
      line-height: 1.6;
    }
    .design-steps-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .design-steps-table th {
      background: var(--primary-bg);
      color: var(--primary-dark);
      padding: 6px 8px;
      text-align: left;
      font-weight: 600;
    }
    .design-steps-table td {
      padding: 5px 8px;
      border-bottom: 1px solid var(--border);
    }
    .design-steps-table tr:hover td {
      background: var(--primary-bg);
    }
    .design-preview ul {
      padding-left: 20px;
      font-size: 13px;
    }
    .design-preview li {
      margin-bottom: 4px;
    }
    .design-actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .design-feedback {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .design-feedback textarea {
      width: 100%;
      padding: 10px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-family: inherit;
      font-size: 13px;
      resize: vertical;
      margin-bottom: 8px;
    }
    .design-feedback textarea:focus {
      border-color: var(--primary);
      outline: none;
    }

    /* Typing indicator */
    .typing-indicator { display: flex; gap: 4px; padding: 6px 0; }
    .typing-indicator span {
      width: 7px; height: 7px;
      background: var(--primary);
      border-radius: 50%;
      animation: bounce 1.4s infinite;
      opacity: 0.6;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-7px); }
    }

    /* Question cards */
    .question-cards {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: 12px;
      max-width: 90%;
    }
    .question-card {
      padding: 12px 16px;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
    .question-card:hover {
      border-color: var(--primary);
      background: var(--primary-bg);
    }
    .question-card.selected {
      border-color: var(--primary);
      background: var(--primary-bg);
      box-shadow: 0 0 0 1px var(--primary);
    }
    .question-card .card-label {
      font-weight: 700;
      color: var(--primary-dark);
      margin-bottom: 2px;
    }
    .question-card .card-desc {
      font-size: 12px;
      color: var(--text-muted);
    }
    .question-other {
      display: flex;
      gap: 8px;
      margin-top: 6px;
      max-width: 90%;
    }
    .question-other input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .question-other input:focus { border-color: var(--primary); }
    .question-other input::placeholder { color: var(--text-muted); }
    .question-other .send-card-btn {
      padding: 10px 20px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .question-other .send-card-btn:hover { background: var(--primary-dark); }
    .question-other .send-card-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Loading spinner */
    .loading-overlay {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 32px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid var(--border);
      border-top: 4px solid var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .loading-text {
      font-size: 14px;
      font-weight: 700;
      color: var(--primary-dark);
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

<div class="header">
  <img src="/cloud_logo.svg" alt="b→dash" style="height:28px;margin-right:8px">
  <h1>データパレット構築 設計書・手順書ジェネレーター</h1>
</div>

<div class="main-content">
  <div class="content-wrapper">

    <!-- Section 1: 2-column Input/Output -->
    <div class="columns">
      <!-- Left: Input -->
      <div class="panel">
        <div class="panel-header">
          <h2>インプット（テーブル定義書）</h2>
          <span class="badge" id="inputCount">0 テーブル</span>
        </div>

        <div class="input-method-toggle">
          <button class="toggle-btn active" onclick="switchInputMethod('preset', this)">プリセット</button>
          <button class="toggle-btn" onclick="switchInputMethod('upload', this)">ファイルアップロード</button>
          <button class="toggle-btn" onclick="switchInputMethod('text', this)">テキスト入力</button>
        </div>

        <!-- Preset -->
        <div id="inputPreset">
          <div class="preset-search-wrap">
            <span class="preset-search-icon">&#128269;</span>
            <input type="text" class="preset-search" id="presetSearch" placeholder="業界を検索..." oninput="filterPresets()">
          </div>
          <div class="preset-chips" id="presetChips"></div>
          <div class="preset-no-match" id="presetNoMatch">該当する業界がありません</div>
        </div>

        <!-- File upload -->
        <div id="inputUpload" class="hidden">
          <div class="drop-zone" id="inputDropZone" onclick="document.getElementById('inputFileInput').click()">
            <div class="icon">&#128196;</div>
            <p>テーブル定義書をドロップ<br>または クリックして選択（Excel / CSV）</p>
            <input type="file" id="inputFileInput" accept=".xlsx,.xls,.csv" multiple>
          </div>
        </div>

        <!-- Text input -->
        <div id="inputText" class="hidden">
          <textarea class="text-input-area" id="inputTextInput"
            placeholder="テーブル定義をテキストで入力&#10;&#10;■ b→dashメタデータ形式（タブ区切りで貼り付け）:&#10;データファイル名&#9;カラム論理名&#9;データ型&#9;顧客IDフラグ&#10;顧客&#9;顧客ID&#9;テキスト型&#9;★TRUE&#10;顧客&#9;メールアドレス&#9;テキスト型&#10;&#10;■ 手入力形式:&#10;【顧客】&#10;顧客ID テキスト&#10;メールアドレス テキスト"></textarea>
          <button class="text-ok-btn" onclick="parseInputText()">OK</button>
        </div>

        <div class="file-list" id="inputFileList"></div>

        <!-- インプットプレビュー -->
        <div id="inputPreviewArea" class="hidden"></div>
      </div>

      <!-- Right: Output -->
      <div class="panel">
        <div class="panel-header">
          <h2>アウトプット（テーブル定義）</h2>
          <span class="badge" id="outputCount">未設定</span>
        </div>

        <div class="input-method-toggle">
          <button class="toggle-btn active" onclick="switchOutputMethod('upload', this)">ファイルアップロード</button>
          <button class="toggle-btn" onclick="switchOutputMethod('text', this)">テキスト入力</button>
        </div>

        <!-- File upload -->
        <div id="outputUpload">
          <div class="drop-zone" id="outputDropZone" onclick="document.getElementById('outputFileInput').click()">
            <div class="icon">&#128203;</div>
            <p>テーブル定義ファイルをドロップ<br>または クリックして選択（Excel / CSV）</p>
            <input type="file" id="outputFileInput" accept=".xlsx,.xls,.csv">
          </div>
        </div>

        <!-- Text input -->
        <div id="outputText" class="hidden">
          <textarea class="text-input-area" id="outputTextInput"
            placeholder="最終テーブルのカラム定義をテキストで入力&#10;&#10;例:&#10;顧客ID - 顧客テーブルの顧客ID&#10;メールアドレス - 顧客テーブルのメールアドレス&#10;最終カート投入日 - webアクセスログから算出&#10;カート投入商品名1 - 商品テーブルの商品名"></textarea>
        </div>

        <div class="file-list" id="outputFileList"></div>
      </div>
    </div>

    <!-- Section 2: Generate button -->
    <div class="generate-area">
      <button class="generate-btn" id="generateBtn" onclick="startGeneration()" disabled>設計書を作成する</button>
    </div>

    <!-- Section 3: AI Chat Area -->
    <div class="ai-area hidden" id="aiArea">
      <div class="ai-area-header">AI アシスタント</div>
      <div class="ai-messages" id="aiMessages"></div>
      <div class="ai-input-area" id="aiInputArea">
        <textarea id="aiInput" placeholder="回答を入力..." rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage();}"></textarea>
        <button class="send-btn" id="aiSendBtn" onclick="sendMessage()">&#10148;</button>
      </div>
    </div>

  </div>
</div>

<script>
  // --- State ---
  let inputTables = [];
  let outputMapping = null;
  let outputTextMode = false;
  let sessionId = null;
  let isLoading = false;
  let industriesData = {};
  let selectedPresetKey = null;
  let currentStatus = null; // "asking" | "generating" | "done"

  // --- Init ---
  async function init() {
    try {
      const res = await fetch("/api/industries");
      industriesData = await res.json();
      const chipsContainer = document.getElementById("presetChips");
      for (const [key, ind] of Object.entries(industriesData)) {
        const chip = document.createElement("button");
        chip.className = "preset-chip";
        chip.dataset.key = key;
        chip.textContent = ind.label;
        chip.onclick = () => togglePreset(key);
        chipsContainer.appendChild(chip);
      }
    } catch(e) { console.error("Failed to load presets:", e); }

    setupDropZone("inputDropZone", "inputFileInput", handleInputFiles);
    setupDropZone("outputDropZone", "outputFileInput", handleOutputFiles);
  }
  init();

  // --- Drop zone setup ---
  function setupDropZone(zoneId, inputId, handler) {
    const zone = document.getElementById(zoneId);
    const input = document.getElementById(inputId);

    zone.addEventListener("dragover", e => { e.preventDefault(); zone.classList.add("dragover"); });
    zone.addEventListener("dragleave", () => zone.classList.remove("dragover"));
    zone.addEventListener("drop", e => {
      e.preventDefault();
      zone.classList.remove("dragover");
      handler(e.dataTransfer.files);
    });
    input.addEventListener("change", e => handler(e.target.files));
  }

  // --- Input method toggle ---
  function switchInputMethod(method, btn) {
    const panel = btn.closest(".panel");
    panel.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("inputPreset").classList.toggle("hidden", method !== "preset");
    document.getElementById("inputUpload").classList.toggle("hidden", method !== "upload");
    document.getElementById("inputText").classList.toggle("hidden", method !== "text");
  }

  function parseInputText() {
    const text = document.getElementById("inputTextInput").value.trim();
    if (!text) { inputTables = []; document.getElementById("inputCount").textContent = inputTables.length + " テーブル"; renderInputPreview(); updateGenerateBtn(); return; }

    const lines = text.split("\n").filter(l => l.trim());
    if (!lines.length) { inputTables = []; document.getElementById("inputCount").textContent = inputTables.length + " テーブル"; renderInputPreview(); updateGenerateBtn(); return; }

    const firstLine = lines[0].toLowerCase();
    const isBdashMeta = firstLine.includes("データファイル名") && firstLine.includes("カラム論理名");
    let tables = [];

    if (isBdashMeta) {
      const headers = lines[0].split(/\t/);
      const tblIdx = headers.findIndex(h => h.trim() === "データファイル名");
      const nameIdx = headers.findIndex(h => h.trim() === "カラム論理名");
      const typeIdx = headers.findIndex(h => h.trim() === "データ型");
      const cidIdx = headers.findIndex(h => h.trim() === "顧客IDフラグ");
      if (tblIdx >= 0 && nameIdx >= 0) {
        const tablesDict = {};
        for (let i = 1; i < lines.length; i++) {
          const parts = lines[i].split(/\t/);
          const tblName = parts[tblIdx] ? parts[tblIdx].trim() : "";
          const colName = parts[nameIdx] ? parts[nameIdx].trim() : "";
          if (!tblName || !colName) continue;
          const colType = typeIdx >= 0 && parts[typeIdx] ? parts[typeIdx].trim() : "";
          const isCid = cidIdx >= 0 && parts[cidIdx] ? /true|★true|1|○|yes/i.test(parts[cidIdx].trim()) : false;
          if (!tablesDict[tblName]) tablesDict[tblName] = [];
          tablesDict[tblName].push({ name: colName, type: colType, description: isCid ? "顧客ID（結合キー）" : "" });
        }
        tables = Object.entries(tablesDict).map(([name, cols]) => ({ table_name: name, columns: cols }));
      }
    } else {
      let currentTable = null;
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) continue;
        const tableMatch = trimmed.match(/^[【\[](.+?)[】\]]/);
        if (tableMatch) {
          if (currentTable && currentTable.columns.length > 0) tables.push(currentTable);
          currentTable = { table_name: tableMatch[1].trim(), columns: [] };
          continue;
        }
        if (currentTable) {
          const parts = trimmed.split(/\t+|\s{2,}/);
          const name = parts[0] ? parts[0].trim() : "";
          const type = parts[1] ? parts[1].trim() : "";
          if (name) currentTable.columns.push({ name, type, description: "" });
        }
      }
      if (currentTable && currentTable.columns.length > 0) tables.push(currentTable);
    }

    inputTables = tables;
    const textarea = document.getElementById("inputTextInput");
    const btn = document.querySelector("#inputText .text-ok-btn");
    if (tables.length > 0) {
      const totalCols = tables.reduce((s, t) => s + t.columns.length, 0);
      textarea.style.opacity = "0.6";
      textarea.style.borderColor = "var(--accent-green)";
      btn.textContent = `✓ ${tables.length}テーブル / ${totalCols}カラム 読み込み済み`;
      btn.style.background = "var(--accent-green)";
    } else {
      textarea.style.opacity = "1";
      textarea.style.borderColor = "";
      btn.textContent = "OK";
      btn.style.background = "";
    }
    document.getElementById("inputCount").textContent = inputTables.length + " テーブル"; renderInputPreview();
    updateGenerateBtn();
  }

  function switchOutputMethod(method, btn) {
    outputTextMode = (method === "text");
    const panel = btn.closest(".panel");
    panel.querySelectorAll(".toggle-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("outputUpload").classList.toggle("hidden", method !== "upload");
    document.getElementById("outputText").classList.toggle("hidden", method !== "text");
    updateGenerateBtn();
  }

  // --- Preset ---
  function togglePreset(key) {
    const chips = document.querySelectorAll(".preset-chip");
    if (selectedPresetKey === key) {
      selectedPresetKey = null;
      chips.forEach(c => c.classList.remove("selected"));
      inputTables = [];
      updateGenerateBtn();
      return;
    }
    selectedPresetKey = key;
    chips.forEach(c => c.classList.toggle("selected", c.dataset.key === key));
    inputTables = industriesData[key].tables.map(t => ({
      table_name: t.table_name,
      columns: t.columns.map(c => ({ name: c.name, type: c.type || "", description: c.description || "" })),
    }));
    document.getElementById("inputCount").textContent = inputTables.length + " テーブル"; renderInputPreview();
    updateGenerateBtn();
  }

  function filterPresets() {
    const query = document.getElementById("presetSearch").value.toLowerCase();
    const chips = document.querySelectorAll(".preset-chip");
    let visibleCount = 0;
    chips.forEach(chip => {
      const match = !query || chip.textContent.toLowerCase().includes(query);
      chip.classList.toggle("hidden", !match);
      if (match) visibleCount++;
    });
    document.getElementById("presetNoMatch").style.display = visibleCount === 0 ? "block" : "none";
  }

  // --- File upload handlers ---
  async function handleInputFiles(files) {
    for (const file of files) {
      const formData = new FormData();
      formData.append("file", file);
      formData.append("file_type", "input");

      try {
        const res = await fetch("/api/upload", { method: "POST", body: formData });
        const data = await res.json();
        if (data.tables) {
          for (const t of data.tables) {
            const existing = inputTables.findIndex(x => x.table_name === t.table_name);
            if (existing >= 0) inputTables[existing] = t;
            else inputTables.push(t);
          }
          addFileItem("inputFileList", file.name, "input");
        }
      } catch(e) {
        console.error(e);
        alert("ファイル解析に失敗しました: " + file.name);
      }
    }
    document.getElementById("inputCount").textContent = inputTables.length + " テーブル"; renderInputPreview();
    updateGenerateBtn();
  }

  async function handleOutputFiles(files) {
    const file = files[0];
    const formData = new FormData();
    formData.append("file", file);
    formData.append("file_type", "output");

    try {
      const res = await fetch("/api/upload", { method: "POST", body: formData });
      const data = await res.json();
      if (data.mapping) {
        outputMapping = data.mapping;
        document.getElementById("outputFileList").innerHTML = "";
        addFileItem("outputFileList", file.name, "output");
        document.getElementById("outputCount").textContent = outputMapping.columns.length + " カラム";
      }
    } catch(e) {
      console.error(e);
      alert("ファイル解析に失敗しました");
    }
    updateGenerateBtn();
  }

  function addFileItem(listId, name, type) {
    const list = document.getElementById(listId);
    const item = document.createElement("div");
    item.className = "file-item";
    item.innerHTML = '<span class="name">' + name + '</span><span class="remove" onclick="removeFile(this, \'' + type + '\')">\u2715</span>';
    list.appendChild(item);
  }

  function removeFile(el, type) {
    el.parentElement.remove();
    if (type === "output") {
      outputMapping = null;
      document.getElementById("outputCount").textContent = "未設定";
    }
    updateGenerateBtn();
  }

  // --- Input preview ---
  function renderInputPreview() {
    const area = document.getElementById("inputPreviewArea");
    if (!inputTables.length) {
      area.classList.add("hidden");
      area.innerHTML = "";
      return;
    }
    let html = "";
    for (const table of inputTables) {
      html += `<details class="input-preview-section">`;
      html += `<summary>${table.table_name}（${table.columns.length}カラム）</summary>`;
      html += `<table class="input-preview-table"><tr><th>カラム名</th><th>データ型</th></tr>`;
      for (const col of table.columns) {
        const cidBadge = col.description && col.description.includes("顧客ID") ? `<span class="cid-badge">結合キー</span>` : "";
        html += `<tr><td>${col.name}${cidBadge}</td><td>${col.type}</td></tr>`;
      }
      html += `</table></details>`;
    }
    area.innerHTML = html;
    area.classList.remove("hidden");
  }

  // --- Generate button state ---
  function updateGenerateBtn() {
    const hasInput = inputTables.length > 0;
    const hasOutput = outputTextMode
      ? document.getElementById("outputTextInput").value.trim().length > 0
      : (outputMapping && outputMapping.columns && outputMapping.columns.length > 0);
    document.getElementById("generateBtn").disabled = !(hasInput && hasOutput);
  }
  document.getElementById("outputTextInput").addEventListener("input", updateGenerateBtn);

  // --- Start Generation (Phase 1) ---
  async function startGeneration() {
    if (isLoading) return;
    isLoading = true;
    document.getElementById("generateBtn").disabled = true;

    // Build output mapping from text if needed
    let finalOutputMapping = outputMapping;
    if (outputTextMode) {
      const text = document.getElementById("outputTextInput").value.trim();
      const lines = text.split("\n").filter(l => l.trim());
      finalOutputMapping = {
        columns: lines.map(line => {
          const parts = line.split(/[-\u2013\u2014\u2015\u30fc]/).map(s => s.trim());
          return {
            name: parts[0] || line.trim(),
            definition: parts[1] || "",
            source_column: "",
            source_table: "",
          };
        })
      };
    }

    // Show AI area
    const aiArea = document.getElementById("aiArea");
    aiArea.classList.remove("hidden");
    renderMessage("user", "設計書の作成を開始します...");
    showTyping();

    try {
      const res = await fetch("/api/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          input_tables: inputTables,
          output_mapping: finalOutputMapping,
        }),
      });
      const data = await res.json();
      sessionId = data.session_id;
      currentStatus = data.status;
      removeTyping();

      handleAiResponse(data);
    } catch(e) {
      removeTyping();
      renderMessage("ai", "エラーが発生しました。もう一度お試しください。");
    }

    isLoading = false;
  }

  // --- Send Message (Chat) ---
  async function sendMessage(text) {
    if (!text) {
      const input = document.getElementById("aiInput");
      text = input.value.trim();
      if (!text) return;
      input.value = "";
    }
    if (isLoading || !sessionId) return;

    isLoading = true;
    renderMessage("user", text);
    showTyping();

    try {
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: text }),
      });
      const data = await res.json();
      currentStatus = data.status;
      removeTyping();

      handleAiResponse(data);
    } catch(e) {
      removeTyping();
      renderMessage("ai", "エラーが発生しました。");
    }

    isLoading = false;
  }

  // --- Handle AI response ---
  function handleAiResponse(data) {
    if (data.status === "asking") {
      renderMessage("ai", data.reply);
      const parsed = parseAiQuestions(data.reply);
      if (!parsed) {
        document.getElementById("aiInputArea").classList.add("visible");
      } else {
        document.getElementById("aiInputArea").classList.remove("visible");
      }
    } else if (data.status === "design_ready") {
      renderMessage("ai", data.reply);
      document.getElementById("aiInputArea").classList.remove("visible");
      showDesignPreview(data.design_summary, data.design_download_url);
    } else if (data.status === "done") {
      renderMessage("ai", data.reply);
      document.getElementById("aiInputArea").classList.remove("visible");
      removeLoadingSpinner();
      showDownloadButtons(data.design_download_url, data.procedure_download_url);
      if (data.procedure_text) {
        showProcedureText(data.procedure_text);
      }
    }
  }

  // --- Render message ---
  function renderMessage(role, text) {
    const container = document.getElementById("aiMessages");
    const msg = document.createElement("div");
    msg.className = "ai-msg " + role;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    if (role === "ai") {
      const img = document.createElement("img");
      img.src = "/bdash_hakase.png";
      img.alt = "AI";
      avatar.appendChild(img);
    }

    const bubble = document.createElement("div");
    bubble.className = "bubble";

    if (role === "ai") {
      const parsed = parseAiQuestions(text);
      if (parsed) {
        // Intro text
        const textSpan = document.createElement("span");
        textSpan.textContent = parsed.intro;
        bubble.appendChild(textSpan);

        // Option cards
        const cards = document.createElement("div");
        cards.className = "question-cards";
        parsed.options.forEach(function(opt) {
          const card = document.createElement("div");
          card.className = "question-card";
          card.innerHTML = '<div class="card-label">' + opt.label + '</div>' + (opt.desc ? '<div class="card-desc">' + opt.desc + '</div>' : '');
          card.onclick = function() {
            cards.querySelectorAll(".question-card").forEach(function(c) { c.classList.remove("selected"); });
            card.classList.add("selected");
            disableQuestionUI();
            sendMessage(opt.label);
          };
          cards.appendChild(card);
        });
        bubble.appendChild(cards);

        // Free text input (other)
        var otherRow = document.createElement("div");
        otherRow.className = "question-other";
        var otherInput = document.createElement("input");
        otherInput.type = "text";
        otherInput.placeholder = "その他（自由入力）";
        otherInput.onkeydown = function(e) {
          if (e.key === "Enter" && otherInput.value.trim()) {
            disableQuestionUI();
            sendMessage(otherInput.value.trim());
          }
        };
        var otherBtn = document.createElement("button");
        otherBtn.className = "send-card-btn";
        otherBtn.textContent = "送信";
        otherBtn.onclick = function() {
          if (otherInput.value.trim()) {
            disableQuestionUI();
            sendMessage(otherInput.value.trim());
          }
        };
        otherRow.appendChild(otherInput);
        otherRow.appendChild(otherBtn);
        bubble.appendChild(otherRow);
      } else {
        bubble.textContent = text;
      }
    } else {
      bubble.textContent = text;
    }

    msg.appendChild(avatar);
    msg.appendChild(bubble);
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  // --- Parse AI questions ---
  function parseAiQuestions(text) {
    var lines = text.split("\n");
    var optionPattern = /^\s*(?:[A-C]\)|[\u2460\u2461\u2462]|[1-3]\))\s*(.+)/;
    var options = [];
    var introLines = [];
    var foundOptions = false;

    for (var i = 0; i < lines.length; i++) {
      var match = lines[i].match(optionPattern);
      if (match) {
        foundOptions = true;
        var parts = match[1].split(/[:：→\-]/).map(function(s) { return s.trim(); });
        options.push({
          label: parts[0],
          desc: parts.length > 1 ? parts.slice(1).join(" - ") : "",
        });
      } else if (!foundOptions) {
        introLines.push(lines[i]);
      }
    }

    if (options.length >= 2) {
      return { intro: introLines.join("\n").trim(), options: options };
    }
    return null;
  }

  // --- Disable question UI after selection ---
  function disableQuestionUI() {
    document.querySelectorAll(".question-cards").forEach(function(el) {
      el.querySelectorAll(".question-card").forEach(function(c) {
        c.style.pointerEvents = "none";
        c.style.opacity = "0.5";
      });
    });
    document.querySelectorAll(".question-other").forEach(function(el) {
      el.style.pointerEvents = "none";
      el.style.opacity = "0.5";
    });
  }

  // --- Typing indicator ---
  function showTyping() {
    var container = document.getElementById("aiMessages");
    var msg = document.createElement("div");
    msg.className = "ai-msg ai";
    msg.id = "typing";
    msg.innerHTML = '<div class="avatar"><img src="/bdash_hakase.png" alt="AI"></div><div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>';
    container.appendChild(msg);
    container.scrollTop = container.scrollHeight;
  }

  function removeTyping() {
    var el = document.getElementById("typing");
    if (el) el.remove();
  }

  // --- Loading spinner (Phase 2 generation) ---
  // --- Design preview + feedback + approve ---
  function showDesignPreview(summary, designUrl) {
    var container = document.getElementById("aiMessages");
    var area = document.createElement("div");
    area.className = "design-preview";

    // Header
    var header = document.createElement("div");
    header.className = "design-preview-header";
    header.textContent = "設計書プレビュー";
    area.appendChild(header);

    // Summary
    if (summary.summary) {
      var sumEl = document.createElement("div");
      sumEl.className = "design-preview-section";
      sumEl.innerHTML = '<div class="design-label">概要</div><div class="design-value">' + summary.summary + '</div>';
      area.appendChild(sumEl);
    }

    // Steps
    if (summary.steps && summary.steps.length) {
      var stepsEl = document.createElement("div");
      stepsEl.className = "design-preview-section";
      stepsEl.innerHTML = '<div class="design-label">処理ステップ（' + summary.total_operations + '操作）</div>';
      var table = document.createElement("table");
      table.className = "design-steps-table";
      table.innerHTML = '<tr><th>Step</th><th>操作</th><th>保存ファイル</th></tr>';
      summary.steps.forEach(function(s) {
        var tr = document.createElement("tr");
        tr.innerHTML = '<td>' + (s.step || '') + '</td><td>' + s.operation + '</td><td>' + (s.save_as || '(連続)') + '</td>';
        table.appendChild(tr);
      });
      stepsEl.appendChild(table);
      area.appendChild(stepsEl);
    }

    // Business rules
    if (summary.business_rules && summary.business_rules.length) {
      var rulesEl = document.createElement("div");
      rulesEl.className = "design-preview-section";
      rulesEl.innerHTML = '<div class="design-label">業務ルール</div>';
      var ul = document.createElement("ul");
      summary.business_rules.forEach(function(r) {
        var li = document.createElement("li");
        li.textContent = r;
        ul.appendChild(li);
      });
      rulesEl.appendChild(ul);
      area.appendChild(rulesEl);
    }

    // Action buttons
    var actions = document.createElement("div");
    actions.className = "design-actions";

    if (designUrl) {
      var dlBtn = document.createElement("a");
      dlBtn.href = designUrl;
      dlBtn.download = "";
      dlBtn.className = "download-btn outlined";
      dlBtn.textContent = "設計書をダウンロード";
      actions.appendChild(dlBtn);
    }

    var approveBtn = document.createElement("button");
    approveBtn.className = "download-btn primary";
    approveBtn.textContent = "この設計書で手順書を生成する";
    approveBtn.onclick = function() { approveDesign(); };
    actions.appendChild(approveBtn);

    area.appendChild(actions);

    // Feedback input
    var fbArea = document.createElement("div");
    fbArea.className = "design-feedback";
    fbArea.innerHTML = '<div class="design-label">修正がある場合はフィードバックを入力</div>';
    var fbInput = document.createElement("textarea");
    fbInput.id = "designFeedbackInput";
    fbInput.placeholder = "例: カテゴリのグループ化が足りない、ステップ5と6の順序を逆にして...";
    fbInput.rows = 3;
    fbArea.appendChild(fbInput);

    var fbBtn = document.createElement("button");
    fbBtn.className = "download-btn outlined";
    fbBtn.textContent = "フィードバックを送信して設計書を修正";
    fbBtn.onclick = function() { sendDesignFeedback(); };
    fbArea.appendChild(fbBtn);

    area.appendChild(fbArea);
    container.appendChild(area);
    container.scrollTop = container.scrollHeight;
  }

  async function approveDesign() {
    showLoadingSpinner();
    try {
      var res = await fetch("/api/generate-procedure", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId }),
      });
      var data = await res.json();
      removeLoadingSpinner();
      if (data.status === "done") {
        renderMessage("ai", data.reply);
        showDownloadButtons(data.design_download_url, data.procedure_download_url);
        if (data.procedure_text) {
          showProcedureText(data.procedure_text);
        }
      } else {
        renderMessage("ai", "手順書生成に失敗しました: " + data.reply);
        if (data.procedure_text) {
          showProcedureText(data.procedure_text);
        }
      }
    } catch(e) {
      removeLoadingSpinner();
      renderMessage("ai", "エラーが発生しました: " + e.message);
      console.error("Procedure generation error:", e);
    }
  }

  async function sendDesignFeedback() {
    var fb = document.getElementById("designFeedbackInput").value.trim();
    if (!fb) return;
    renderMessage("user", fb);
    document.getElementById("designFeedbackInput").value = "";
    showTyping();
    try {
      var res = await fetch("/api/design-feedback", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id: sessionId, message: fb }),
      });
      var data = await res.json();
      removeTyping();
      handleAiResponse(data);
    } catch(e) {
      removeTyping();
      renderMessage("ai", "エラーが発生しました。");
    }
  }

  function showLoadingSpinner() {
    var container = document.getElementById("aiMessages");
    var overlay = document.createElement("div");
    overlay.className = "loading-overlay";
    overlay.id = "loadingSpinner";
    overlay.innerHTML = '<div class="spinner"></div><div class="loading-text">手順書を生成中...</div>';
    container.appendChild(overlay);
    container.scrollTop = container.scrollHeight;
  }

  function removeLoadingSpinner() {
    var el = document.getElementById("loadingSpinner");
    if (el) el.remove();
  }

  // --- Download buttons ---
  function showDownloadButtons(designUrl, procedureUrl) {
    var container = document.getElementById("aiMessages");
    var area = document.createElement("div");
    area.className = "download-area";

    if (designUrl) {
      var designBtn = document.createElement("a");
      designBtn.href = designUrl;
      designBtn.className = "download-btn outlined";
      designBtn.download = "";
      designBtn.textContent = "設計書をダウンロード (JSON)";
      area.appendChild(designBtn);
    }

    if (procedureUrl) {
      var procBtn = document.createElement("a");
      procBtn.href = procedureUrl;
      procBtn.className = "download-btn primary";
      procBtn.download = "";
      procBtn.textContent = "手順書をダウンロード (Excel)";
      area.appendChild(procBtn);
    }

    container.appendChild(area);
    container.scrollTop = container.scrollHeight;
  }

  function showProcedureText(text) {
    var container = document.getElementById("aiMessages");
    var wrapper = document.createElement("div");
    wrapper.className = "procedure-text-wrapper";

    var toggle = document.createElement("button");
    toggle.className = "procedure-text-toggle";
    toggle.textContent = "▶ 手順書テキストを表示（ダウンロードできない場合はこちらをコピー）";
    toggle.onclick = function() {
      var content = wrapper.querySelector(".procedure-text-content");
      if (content.style.display === "none") {
        content.style.display = "block";
        toggle.textContent = "▼ 手順書テキストを閉じる";
      } else {
        content.style.display = "none";
        toggle.textContent = "▶ 手順書テキストを表示（ダウンロードできない場合はこちらをコピー）";
      }
    };
    wrapper.appendChild(toggle);

    var content = document.createElement("pre");
    content.className = "procedure-text-content";
    content.style.display = "none";
    content.textContent = text;
    wrapper.appendChild(content);

    var copyBtn = document.createElement("button");
    copyBtn.className = "procedure-text-copy";
    copyBtn.textContent = "テキストをコピー";
    copyBtn.onclick = function() {
      navigator.clipboard.writeText(text).then(function() {
        copyBtn.textContent = "✓ コピーしました";
        setTimeout(function() { copyBtn.textContent = "テキストをコピー"; }, 2000);
      });
    };
    wrapper.appendChild(copyBtn);

    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight;
  }
</script>

</body>
</html>

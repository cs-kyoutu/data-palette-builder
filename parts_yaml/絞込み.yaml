operation: 絞込み
format_single: |
  『絞込み』
  「{column}」が{condition}に絞り込む
format_multi: |
  『絞込み』
  {conditions_text}
  に絞り込む
variables:
  conditions:
    type: list
    item:
      column: { type: text }
      condition: { type: text }
      value: { type: text, optional: true }
  logic:
    type: enum
    values: [AND, OR]
condition_patterns:
  完全一致: '""{value}""《次に完全一致》'
  不一致: '""{value}""《次に完全一致しない》'
  含む: '""{value}""《次を含む》'
  含まない: '""{value}""《次を含まない》'
  含む_複数: '""{value}""《次を含む(カンマ区切りで複数指定)》'
  含まない_複数: '""{value}""《次を含まない(カンマ区切りで複数指定)》'
  空文字ではない: '《空文字ではない》'
  空文字: '《空文字》'
  NULL: '《NULL》'
  NULLではない: '《NULLではない》'
  true: '《true》'
  false: '《false》'
  以上: '""{value}""《次の値以上》'
  以下: '""{value}""《次の値以下》'
  等しい: '""{value}""《次と等しい》'
  等しくない: '""{value}""《次と等しくない》'
  範囲: '""{from}""~""{to}""《次の値の間》'
  次で始まる: '""{value}""《次で始まる》'
  相対期間: '《相対期間》[開始日]《{start_n}》《{start_unit}》《前》と[終了日]《{end_n}》《{end_unit}》《{end_direction}》《次の期間にある》'

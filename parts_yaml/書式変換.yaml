operation: 書式変換
format: |
  『書式変換』
  「{column}」を選択、[オプション(歯車アイコン)]を押下し、《{conversion}》に変換
  《{save_method}》にて保存
  クレンジングタスクの保存名を""{task_name}""にする
variables:
  column: { type: text }
  conversion:
    type: enum
    values: [半角英小文字, 半角英大文字, 全角→半角, 半角→全角]
  save_method:
    type: enum
    values: [上書き保存, 名前を付けて保存]
  task_name: { type: text }

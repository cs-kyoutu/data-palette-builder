operation: 参照
format: |
  『参照』
  《{pattern}》を選択し、[適用]を押下する
  「{group_key}」でグループ化、「{sort_column}」の《{sort_order}》でソートを行い
  「{value_column}」を参照する
  空文字/Nullの値を《{null_handling}》を選択し[適用]を押下する
  クレンジングタスクの保存名を""{task_name}""にする
variables:
  pattern:
    type: enum
    values: [最初の値, 最後の値, 特定順番の値, 前の行の値, 後ろの行の値, 累計の値]
  group_key: { type: text }
  sort_column: { type: text }
  sort_order:
    type: enum
    values: [昇順, 降順]
  value_column: { type: text }
  null_handling:
    type: enum
    values: [無視する, 無視しない]
  task_name: { type: text }

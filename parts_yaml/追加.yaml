operation: 追加
format_value: |
  『追加』
  「{base_column}」の《{position}》を選択
  《{data_type}》の""{default_value}""を追加
format_exec_date: |
  『追加』
  「{base_column}」の《{position}》を選択
  《{data_type}》を選択し、[加工処理実行日のカラムを追加する]にチェックを入れる
variables:
  base_column: { type: text }
  position:
    type: enum
    values: [右に追加, 左に追加]
  data_type:
    type: enum
    values: [テキスト型, 整数型, 小数型, 日付型, 日時型]
  default_value: { type: text }
  is_execution_date: { type: boolean, default: false }

operation: 除外
format: |
  『除外』
  「{column}」の《{scope}》""{text}""を除外
  《{save_method}》にて保存
  クレンジングタスクの保存名を""{task_name}""にする
variables:
  column: { type: text }
  scope:
    type: enum
    values: [全ての, 最初の, 最後の]
  text: { type: text }
  save_method:
    type: enum
    values: [上書き保存, 名前を付けて保存]
  task_name: { type: text }

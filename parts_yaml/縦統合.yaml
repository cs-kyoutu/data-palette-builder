operation: 縦統合
format: |
  『縦統合』
  {files_text}を縦統合
  重複データの設定は
  [{duplicate_setting}]を選択し、[適用]を押下する
  データファイルの保存名を""{save_as}""にする
  統合データの更新設定は《{update_setting}》を選択し、[適用]を押下する
variables:
  files: { type: file_list, max: 4 }
  duplicate_setting:
    type: enum
    values: [重複データを除外する, 重複データを除外しない]
  save_as: { type: text }
  update_setting:
    type: enum
    values: [更新する, 更新しない]

operation: 横統合
format: |
  『横統合』
  【{left_file}】と【{right_file}】を「{key_left}」と「{key_right}」を統合キーとして、《{method}》
  残すカラムは、
  【{left_file}】：{left_columns_text}
  【{right_file}】：{right_columns_text}
  データファイルの保存名を""{save_as}""にする
  レコードが重複した際の処理方法は
  《{duplicate_handling}》を選択し、[適用]を押下する
  統合データの更新設定は《{update_setting}》を選択し、[適用]を押下する
variables:
  left_file: { type: text }
  right_file: { type: text }
  key_left: { type: text }
  key_right: { type: text }
  method:
    type: enum
    values: [先に選択したデータに対して統合する, 共通のデータのみを統合する, 全てのデータを統合する, 後に選択したデータに対して統合する]
  left_columns: { type: column_list }
  right_columns: { type: column_list }
  save_as: { type: text }
  duplicate_handling:
    type: enum
    values: [統合処理をエラーにする, 統合処理をエラーにせず実行する]
  update_setting:
    type: enum
    values: [更新する, 更新しない]

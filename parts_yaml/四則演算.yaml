operation: 四則演算
format_column: |
  『四則演算』
  「{column_left}」《{operator}》「{column_right}」、[端数処理]は小数第《{decimal_place}》位を、《{rounding}》する
  クレンジングタスクの保存名を""{task_name}""にする
  表示方法《{keep_original}》を選択
format_fixed: |
  『四則演算』
  「{column_left}」《{operator}》""{fixed_value}""、[端数処理]は小数第《{decimal_place}》位を、《{rounding}》する
  クレンジングタスクの保存名を""{task_name}""にする
  表示方法《{keep_original}》を選択
variables:
  column_left: { type: text }
  operator:
    type: enum
    values: ["+", "-", "×", "÷"]
  column_right: { type: text, optional: true }
  fixed_value: { type: text, optional: true }
  decimal_place:
    type: enum
    values: ["1", "2", "3", "4"]
  rounding:
    type: enum
    values: [四捨五入, 切り捨て, 切り上げ]
  task_name: { type: text }
  keep_original:
    type: enum
    values: [残す, 残さない]

operation: テンプレート 縦持ちを横持ちに変換
format: |
  『テンプレート『顧客ごとに縦持ちのデータを横に並べて変換』』
  {aggregation_keys_text}を集約のキーとして選択し、[適用]を押下する
  [横並びにしたいカラム]に{horizontal_columns_text}の順で選択し、[適用]を押下する
  [並び順カラム]に「{sort_column}」《{sort_order}》を選択し、[適用]を押下する
  [横並びにしたいカラムの数]を、カラムの並び順で設定した順番をもとに、上位《{top_n}》位まで横に並べるとし、[適用]を押下する
variables:
  aggregation_keys: { type: column_list }
  horizontal_columns: { type: column_list }
  sort_column: { type: text }
  sort_order:
    type: enum
    values: [昇順, 降順]
  top_n: { type: integer }

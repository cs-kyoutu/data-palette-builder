operation: IF文
format_value: |
  『IF文』
  {conditions_text}
  いずれの条件分岐にも該当しない場合、{else_value}に変換
format_period: |
  『IF文』
  《絶対期間》を選択
  「{date_column}」が[開始日]「{start_column}」と[終了日]「{end_column}」《指定の期間に一致する》の場合、""{true_value}""に変換
  いずれの条件分岐にも該当しない場合、""{false_value}""に変換
  [開始日時/終了日時を含めない]にチェックを入れない
  [期間指定にカラムを使用する]にチェックを入れる
variables:
  conditions:
    type: list
    item:
      column: { type: text }
      condition: { type: text }
      value: { type: text }
      result: { type: text }
  else_value: { type: text }
condition_patterns:
  完全一致: '「{column}」が""{value}""《次に完全一致》の場合、""{result}""に変換'
  含む: '「{column}」が""{value}""《次を含む》の場合、""{result}""に変換'
  空文字: '「{column}」が《空文字》の場合、""{result}""に変換'
  NULL: '「{column}」が《NULL》の場合、""{result}""に変換'
  NULLではない: '「{column}」が《NULLではない》の場合、""{result}""に変換'
  カラム値一致: '「{column}」が「{value}」《次のカラムの値に完全一致》の場合、""{result}""に変換'
  カンマ区切り複数一致: '「{column}」が""{value}""《次に完全一致(カンマ区切りで複数指定)》の場合、""{result}""に変換'
  以上: '「{column}」が""{value}""《次の値以上》の場合、""{result}""に変換'
  より小さい: '「{column}」が""{value}""《次より小さい》の場合、""{result}""に変換'
  範囲: '「{column}」が""{from}""～""{to}""《次の値の間》の場合、""{result}""に変換'
else_patterns:
  空白: '《空白》'
  元の値: '《元の値のまま》'
  カラム参照: '「{column_name}」'
  固定値: '""{value}""'

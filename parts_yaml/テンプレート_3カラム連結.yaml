operation: テンプレート 3カラム以上連結
format: |
  『テンプレート、3つ以上のカラムやテキストを連結した値を追加』
  {columns_text}を選択する
  [テキスト挿入]を押下し、カラムとカラムの間に""{separator}""を挿入し、[適用]を押下する
  クレンジングタスクの保存名を""{task_name}""にする
  表示方法《{keep_original}》を選択
variables:
  columns: { type: column_list }
  separator: { type: text }
  task_name: { type: text }
  keep_original:
    type: enum
    values: [残す, 残さない]

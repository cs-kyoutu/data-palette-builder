operation: テキスト挿入
format_single: |
  『テキスト挿入』
  「{column}」の《{position}》に""{text}""を挿入
  《{save_method}》にて保存
  クレンジングタスクの保存名を""{task_name}""にする
format_both: |
  『テキスト挿入』
  「{column}」の《文頭》に""{text_head}""、《文末》に""{text_tail}""を挿入
  《{save_method}》にて保存
  クレンジングタスクの保存名を""{task_name}""にする
variables:
  column: { type: text }
  position:
    type: enum
    values: [文頭, 文末]
  text: { type: text }
  text_head: { type: text, optional: true }
  text_tail: { type: text, optional: true }
  save_method:
    type: enum
    values: [上書き保存, 名前を付けて保存]
  task_name: { type: text }
